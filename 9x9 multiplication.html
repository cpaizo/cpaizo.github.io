<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粉彩糖果學園 - 九九乘法</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        
        // 模擬 Lucide 圖示組件
        const Icon = ({ name, size = 24, className = "" }) => {
            React.useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [mode, setMode] = useState('study');
            const [quiz, setQuiz] = useState({
                n1: 0, n2: 0, options: [], answer: 0, score: 0, total: 0, status: 'idle'
            });
            const [isSpeaking, setIsSpeaking] = useState(false);

            const speak = (text, callback) => {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                utterance.rate = 1.0;
                utterance.pitch = 1.3;
                utterance.onstart = () => setIsSpeaking(true);
                utterance.onend = () => {
                    setIsSpeaking(false);
                    if (callback) callback();
                };
                window.speechSynthesis.speak(utterance);
            };

            const generateQuestion = useCallback(() => {
                const n1 = Math.floor(Math.random() * 9) + 1;
                const n2 = Math.floor(Math.random() * 9) + 1;
                const ans = n1 * n2;
                let opts = new Set([ans]);
                while (opts.size < 4) {
                    opts.add((Math.floor(Math.random() * 9) + 1) * (Math.floor(Math.random() * 9) + 1));
                }
                setQuiz(prev => ({
                    ...prev,
                    n1, n2, answer: ans,
                    options: Array.from(opts).sort(() => Math.random() - 0.5),
                    status: 'idle'
                }));
            }, []);

            const handleCellClick = (i, j) => {
                speak(`${i} 乘 ${j} 等於 ${i * j}`);
            };

            const handleAnswer = (val) => {
                if (quiz.status !== 'idle') return;
                const isRight = val === quiz.answer;
                const feedbackText = isRight ? `答對了！${quiz.n1} 乘 ${quiz.n2} 等於 ${quiz.answer}` : `猜錯囉，正確答案是 ${quiz.answer}`;
                setQuiz(prev => ({
                    ...prev,
                    status: isRight ? 'correct' : 'wrong',
                    score: isRight ? prev.score + 1 : prev.score,
                    total: prev.total + 1
                }));
                speak(feedbackText, () => {
                    setTimeout(() => generateQuestion(), 600);
                });
            };

            useEffect(() => {
                if (mode === 'quiz') generateQuestion();
            }, [mode, generateQuestion]);

            const candyColors = [
                'from-pink-300 to-rose-400 shadow-rose-600',
                'from-purple-300 to-indigo-400 shadow-indigo-600',
                'from-sky-300 to-blue-400 shadow-blue-600',
                'from-emerald-300 to-teal-400 shadow-teal-600',
                'from-yellow-200 to-amber-400 shadow-amber-600',
                'from-orange-300 to-red-400 shadow-red-600',
            ];

            return (
                <div className="min-h-screen bg-[#FFF5F8] text-[#D87093] font-sans p-2 sm:p-6 select-none overflow-x-hidden">
                    <div className="max-w-5xl mx-auto">
                        <nav className="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 bg-white/80 p-4 rounded-[2.5rem] shadow-sm backdrop-blur-md border-b-4 border-pink-100">
                            <div className="flex items-center gap-2">
                                <div className="bg-gradient-to-br from-pink-400 to-purple-500 p-2.5 rounded-full shadow-lg">
                                    <Icon name="candy" className="text-white animate-spin-slow" />
                                </div>
                                <h1 className="text-2xl font-black bg-gradient-to-r from-pink-500 to-purple-500 bg-clip-text text-transparent">粉彩糖果學園</h1>
                            </div>
                            <div className="flex gap-2 p-1.5 bg-pink-50 rounded-3xl">
                                <button onClick={() => setMode('study')} className={`px-6 py-2 rounded-2xl font-bold transition-all flex items-center gap-2 ${mode === 'study' ? 'bg-white text-pink-500 shadow-md scale-105' : 'text-pink-300'}`}>
                                    <Icon name="home" size={18} /> 學習模式
                                </button>
                                <button onClick={() => setMode('quiz')} className={`px-6 py-2 rounded-2xl font-bold transition-all flex items-center gap-2 ${mode === 'quiz' ? 'bg-white text-purple-500 shadow-md scale-105' : 'text-purple-300'}`}>
                                    <Icon name="trophy" size={18} /> 挑戰挑戰
                                </button>
                            </div>
                        </nav>

                        {mode === 'study' ? (
                            <div className="bg-white/90 rounded-[3rem] p-3 sm:p-8 shadow-2xl border-b-[12px] border-pink-100 backdrop-blur-sm">
                                <div className="grid grid-cols-10 gap-1.5 sm:gap-4">
                                    <div className="aspect-square flex items-center justify-center"><Icon name="cloud" className="text-pink-100 fill-current" size={32} /></div>
                                    {[1,2,3,4,5,6,7,8,9].map(n => <div key={n} className="aspect-square flex items-center justify-center font-black text-pink-400 text-lg sm:text-2xl bg-pink-50/50 rounded-2xl">{n}</div>)}
                                    {[1,2,3,4,5,6,7,8,9].map(i => (
                                        <React.Fragment key={i}>
                                            <div className="aspect-square flex items-center justify-center font-black text-pink-400 text-lg sm:text-2xl bg-pink-50/50 rounded-2xl">{i}</div>
                                            {[1,2,3,4,5,6,7,8,9].map(j => (
                                                <button key={`${i}-${j}`} onClick={() => handleCellClick(i, j)} className={`group aspect-square relative bg-gradient-to-br ${candyColors[(i+j) % candyColors.length]} rounded-xl sm:rounded-2xl shadow-[0_4px_0_var(--tw-shadow-color)] active:shadow-none active:translate-y-1 transition-all flex flex-col items-center justify-center text-white`}>
                                                    <span className="text-[10px] sm:text-xs opacity-70">{i}x{j}</span>
                                                    <span className="text-lg sm:text-3xl font-black">{i * j}</span>
                                                </button>
                                            ))}
                                        </React.Fragment>
                                    ))}
                                </div>
                                <div className="mt-10 flex items-center justify-center gap-3 font-bold text-pink-400 bg-pink-50/50 py-3 rounded-full">
                                    <Icon name="volume-2" className={isSpeaking ? "animate-ping text-pink-500" : ""} /> 點擊糖果聽聽看怎麼唸！
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-3xl mx-auto">
                                <div className="bg-white rounded-[4rem] p-6 sm:p-14 shadow-2xl border-b-[16px] border-purple-100 text-center relative overflow-hidden">
                                    <div className="flex justify-between items-center mb-10">
                                        <div className="bg-gradient-to-r from-pink-400 to-purple-400 px-8 py-3 rounded-full text-white font-black shadow-lg">🏆 分數：{quiz.score} / {quiz.total}</div>
                                        <button onClick={generateQuestion} className="w-12 h-12 bg-white rounded-full flex items-center justify-center text-pink-300 hover:rotate-180 transition-all duration-500 shadow-md">
                                            <Icon name="rotate-ccw" />
                                        </button>
                                    </div>
                                    <div className="flex items-center justify-center gap-4 mb-14">
                                        <div className="w-24 h-24 sm:w-40 sm:h-40 bg-gradient-to-br from-pink-400 to-rose-500 rounded-[2.5rem] flex items-center justify-center text-5xl sm:text-8xl font-black text-white shadow-xl">{quiz.n1}</div>
                                        <span className="text-4xl sm:text-6xl font-bold text-pink-200">×</span>
                                        <div className="w-24 h-24 sm:w-40 sm:h-40 bg-gradient-to-br from-purple-400 to-indigo-500 rounded-[2.5rem] flex items-center justify-center text-5xl sm:text-8xl font-black text-white shadow-xl">{quiz.n2}</div>
                                        <span className="text-4xl sm:text-6xl font-bold text-pink-200">=</span>
                                        <div className="w-24 h-24 sm:w-40 sm:h-40 bg-white border-8 border-dashed border-pink-100 rounded-[2.5rem] flex items-center justify-center text-5xl font-black text-pink-100">?</div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 sm:gap-8">
                                        {quiz.options.map((opt, idx) => (
                                            <button key={idx} onClick={() => handleAnswer(opt)} disabled={quiz.status !== 'idle'} className={`py-8 sm:py-12 text-4xl sm:text-6xl font-black rounded-[3rem] shadow-xl transition-all active:scale-95 ${quiz.status === 'idle' ? 'bg-white text-pink-400 hover:bg-pink-50' : opt === quiz.answer ? 'bg-emerald-400 text-white' : 'bg-gray-100 text-gray-300'}`}>
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="mt-12 h-16 text-2xl font-black">
                                        {quiz.status === 'correct' && <div className="text-emerald-500 animate-bounce">✨ 好棒喔！答對了！</div>}
                                        {quiz.status === 'wrong' && <div className="text-rose-400">加油，再試一次！</div>}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
