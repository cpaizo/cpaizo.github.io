<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花仙子綠色永續生活：AI 新北低碳無人商店</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tfjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS 視覺裝潢：現代日式簡約與草樹綠森林風格 */
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f4f9f4;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            color: #27ae60;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
        }

        /* 左側：AI 鏡頭區 */
        .video-box {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 400px;
        }

        #webcam-container {
            width: 320px;
            height: 240px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 3px solid #27ae60;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* 👑 鏡頭選擇下拉選單樣式 */
        .camera-selector-box {
            width: 100%;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .camera-select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 2px solid #27ae60;
            background-color: white;
            font-family: inherit;
            font-size: 14px;
            color: #2c3e50;
            outline: none;
            cursor: pointer;
        }

        #label-container {
            width: 100%;
            background: #fafafa;
            padding: 10px;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 13px;
            color: #555;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid #eee;
        }

        /* 互動大按鈕 */
        .btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2);
            margin-bottom: 10px;
            width: 100%;
        }

        .btn:hover { background-color: #219653; transform: scale(1.02); }
        .btn:active { transform: scale(0.98); }

        /* 右側：低碳購物車區 */
        .cart-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 450px;
            display: flex;
            flex-direction: column;
        }

        .status-badge {
            background-color: #e2f4e9;
            color: #27ae60;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .cart-title {
            font-size: 18px;
            font-weight: bold;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            margin-bottom: 15px;
            color: #34495e;
        }

        .cart-items {
            flex-grow: 1;
            min-height: 150px;
            max-height: 200px;
            overflow-y: auto;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed #f1f1f1;
        }

        .del-btn {
            background-color: #ffa64d;
            color: white;
            border: none;
            padding: 3px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .del-btn:hover { background-color: #e68a00; }

        .total-section {
            border-top: 2px solid #ecf0f1;
            padding-top: 15px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
        }

        .total-price { color: #e74c3c; }

        /* 成果大卡片 */
        #esg-card {
            margin-top: 25px;
            background: linear-gradient(135deg, #eaf9f0 0%, #f4fbf7 100%);
            border: 2px dashed #27ae60;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            display: none;
            animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            width: 100%;
            max-width: 880px;
            box-sizing: border-box;
        }

        .leaf-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 24px;
            animation: floatUp 1.2s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>🌿 花仙子永續生活：AI 新北低碳無人商店 🌿</h1>
    <div class="subtitle">新北在地就地取材 ｜ 零食物里程 ｜ 國小智慧科技綠色電商營隊</div>

    <div class="container">
        <div class="video-box">
            <div class="camera-selector-box">
                <label for="videoSource" style="font-size: 13px; font-weight: bold; color: #27ae60;">📸 指定或切換相機鏡頭：</label>
                <select id="videoSource" class="camera-select" onchange="switchCamera()">
                    <option value="">-- 請先啟動相機以載入鏡頭清單 --</option>
                </select>
            </div>

            <div id="webcam-container"></div>
            <button class="btn" id="start-btn" onclick="init()">🔌 啟動 AI 綠色無人商店</button>
            <div id="label-container">📢 AI 大腦數值區</div>
        </div>

        <div class="cart-box">
            <div class="status-badge" id="ai-status">📢 請先點擊按鈕啟動攝影機</div>
            <div class="cart-title">🛒 綠色消費低碳購物車</div>
            
            <div class="cart-items" id="cart-list"></div>

            <div class="total-section">
                <span>合計總金額：</span>
                <span class="total-price">NT$ <span id="total-amount">0</span> 元</span>
            </div>
            
            <button class="btn" style="margin-top:15px; background-color:#2f80ed; box-shadow:0 4px 6px rgba(47,128,237,0.2); width:100%;" onclick="checkout()">🌱 完成新北低碳交易</button>
        </div>
    </div>

    <div id="esg-card"></div>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/V6Bl8_dTD/";
        
        const fruitDatabase = {
            "香蕉": { name: "🍌 烏來山區泉水現採香蕉", price: 20, eco: "支持烏來泰雅部落小農，在地運送零污染！" },
            "紅蘋果": { name: "🍎 淡水在地現摘高山紅蘋果", price: 25, eco: "淡水就地取材，免除跨國坐船海運排碳！" },
            "青蘋果": { name: "🍏 三芝海岸陽光脆甜青蘋果", price: 25, eco: "三芝海風灌溉，食物里程縮短 100 倍！" },
            "奇異果": { name: "🥝 烏來山區有機友善奇異果", price: 30, eco: "保護烏來森林水源，吃得健康又環保！" },
            "楊桃": { name: "🌟 八里觀音山左岸黃金楊桃", price: 20, eco: "八里直送，減少大卡車環島運送的廢氣！" }
        };

        let model, webcam, labelContainer, maxPredictions;
        let shoppingCart = {};
        let isCoolingDown = false;
        let animationFrameId; // 用於重新控制相機循環

        // 初始化
        async function init() {
            document.getElementById("start-btn").innerText = "⏳ AI 正在開機連線中...";
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // 👑 取得目前畫面上選定的相機 ID (若有)
                const videoSelect = document.getElementById("videoSource");
                const selectedDeviceId = videoSelect.value || undefined;

                // 啟動相機並嘗試代入選定的鏡頭 ID
                await startWebcamWithDevice(selectedDeviceId);

                // 👑 成功啟動後，自動去抓取這台電腦上所有的相機，塞進下拉選單
                await getCameraDevices();

                document.getElementById("start-btn").style.display = "none";
                document.getElementById("ai-status").innerText = "🍏 偵測中...請把新北水果拿到鏡頭前！";
            } catch (error) {
                console.error(error);
                document.getElementById("start-btn").innerText = "🔌 啟動 AI 綠色無人商店";
                alert("相機或模型載入失敗！請確認網址列左側已允許相機權限。");
            }
        }

        // 👑 核心控制函數：根據指定硬體 ID 啟動相機
        async function startWebcamWithDevice(deviceId) {
            // 如果之前已經有相機在跑，強迫先關閉釋放它
            if (webcam) {
                await webcam.stop();
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            }

            const flip = true;
            webcam = new tmImage.Webcam(320, 240, flip);

            // 如果有指定鏡頭 ID，利用傳入參數強制鎖定它
            if (deviceId) {
                await webcam.setup({ deviceId: deviceId });
            } else {
                await webcam.setup(); // 預設自動抓取
            }

            await webcam.play();
            animationFrameId = window.requestAnimationFrame(loop);

            // 更新畫面畫布
            const container = document.getElementById("webcam-container");
            container.innerHTML = "";
            container.appendChild(webcam.canvas);

            // 初始化數值區
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.className = "label-row";
                labelContainer.appendChild(div);
            }
        }

        // 👑 核心控制函數：撈取電腦上的所有鏡頭裝置
        async function getCameraDevices() {
            const videoSelect = document.getElementById("videoSource");
            const currentSelected = videoSelect.value; // 記住當前選的

            // 撈取裝置列表
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(device => device.kind === 'videoinput');

            videoSelect.innerHTML = "";

            if (videoDevices.length === 0) {
                const opt = document.createElement("option");
                opt.text = "❌ 找不到任何相機鏡頭";
                videoSelect.appendChild(opt);
                return;
            }

            videoDevices.forEach((device, index) => {
                const option = document.createElement("option");
                option.value = device.deviceId;
                // 有些鏡頭會因為隱私沒讀到名稱，自動用「鏡頭 1, 鏡頭 2」替代
                option.text = device.label || `📷 影像硬體鏡頭 ${index + 1}`;
                
                // 如果是剛才正在用的，保持選取
                if (device.deviceId === currentSelected) {
                    option.selected = true;
                }
                videoSelect.appendChild(option);
            });
        }

        // 👑 核心控制函數：當學生下拉切換選單時觸發
        async function switchCamera() {
            const videoSelect = document.getElementById("videoSource");
            const targetDeviceId = videoSelect.value;
            if (!targetDeviceId) return;

            document.getElementById("ai-status").innerText = "🔄 正在切換硬體鏡頭中...";
            try {
                await startWebcamWithDevice(targetDeviceId);
                document.getElementById("ai-status").innerText = "🍏 偵測中...請把新北水果拿到鏡頭前！";
            } catch (e) {
                console.error(e);
                alert("切換鏡頭失敗！可能該鏡頭正被其他視訊軟體佔用。");
            }
        }

        async function loop() {
            webcam.update(); 
            await predict();
            animationFrameId = window.requestAnimationFrame(loop);
        }

        // AI 辨識
        async function predict() {
            if (!model || !webcam) return;

            const prediction = await model.predict(webcam.canvas);
            let highestClass = "";
            let highestProbability = 0;

            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probValue = prediction[i].probability.toFixed(2);
                labelContainer.childNodes[i].innerHTML = `<span>${className}</span> <b>${probValue}</b>`;

                if (prediction[i].probability > highestProbability) {
                    highestProbability = prediction[i].probability;
                    highestClass = className;
                }
            }

            if (highestProbability > 0.85 && highestClass !== "背景" && !isCoolingDown) {
                if (fruitDatabase[highestClass]) {
                    addToCart(highestClass);
                    triggerCoolDown();
                }
            }
        }

        // 防重複刷讀鎖
        function triggerCoolDown() {
            isCoolingDown = true;
            document.getElementById("ai-status").innerHTML = "⚡ 商品感應成功！大腦冷卻防呆中...";
            document.getElementById("ai-status").style.backgroundColor = "#ffeaa7";
            document.getElementById("ai-status").style.color = "#d63031";

            setTimeout(() => {
                isCoolingDown = false;
                document.getElementById("ai-status").innerHTML = "🍏 偵測中...請把新北水果拿到鏡頭前！";
                document.getElementById("ai-status").style.backgroundColor = "#e2f4e9";
                document.getElementById("ai-status").style.color = "#27ae60";
            }, 2500); 
        }

        function addToCart(label) {
            if (shoppingCart[label]) {
                shoppingCart[label].count++;
            } else {
                shoppingCart[label] = {
                    name: fruitDatabase[label].name,
                    price: fruitDatabase[label].price,
                    count: 1
                };
            }
            createLeafEffect();
            renderCart();
        }

        function decreaseItem(label) {
            if (shoppingCart[label]) {
                shoppingCart[label].count--;
                if (shoppingCart[label].count <= 0) {
                    delete shoppingCart[label];
                }
            }
            renderCart();
        }

        function renderCart() {
            const cartList = document.getElementById("cart-list");
            cartList.innerHTML = "";
            let total = 0;

            for (let label in shoppingCart) {
                const item = shoppingCart[label];
                const rowTotal = item.price * item.count;
                total += rowTotal;

                const row = document.createElement("div");
                row.className = "item-row";
                row.innerHTML = `
                    <span>${item.name} <b>x${item.count}</b></span>
                    <div>
                        <span style="margin-right:10px;">$${rowTotal}</span>
                        <button class="del-btn" onclick="decreaseItem('${label}')">放回去 ↩</button>
                    </div>
                `;
                cartList.appendChild(row);
            }
            document.getElementById("total-amount").innerText = total;
        }

        function createLeafEffect() {
            const icons = ['🌱', '🌿', '💚', '☘️'];
            for (let i = 0; i < 6; i++) {
                const leaf = document.createElement('div');
                leaf.className = 'leaf-particle';
                leaf.innerText = icons[Math.floor(Math.random() * icons.length)];
                leaf.style.left = (window.innerWidth / 2 + (Math.random() * 200 - 100)) + 'px';
                leaf.style.top = (window.innerHeight / 2 + (Math.random() * 200 - 100)) + 'px';
                document.body.appendChild(leaf);
                setTimeout(() => leaf.remove(), 1200);
            }
        }

        function checkout() {
            const total = document.getElementById("total-amount").innerText;
            if (total == "0") {
                alert("購物車還是空的，拿個水果感應一下吧！");
                return;
            }

            let pName = prompt("請輸入您的名字（將列印在永續大師證書上）：", "花仙子長官");
            if (!pName) pName = "低碳生活實踐者";

            let ecoStory = "";
            for (let label in shoppingCart) {
                ecoStory += `<li><b>${shoppingCart[label].name}</b>：${fruitDatabase[label].eco}</li>`;
            }

            const card = document.getElementById("esg-card");
            card.style.display = "block";
            card.innerHTML = `
                <h2 style="color:#27ae60; margin-top:0;">🏆 花仙子綠色永續生活大師證書 🏆</h2>
                <p style="font-size:18px;">感謝 <b>【${pName}】</b> 總監參與新北市低碳在地消費！</p>
                <p style="font-size:16px; background:white; padding:15px; border-radius:10px; text-align:left; line-height:1.6;">
                    本次消費總金額為 <b style="color:#e74c3c; font-size:20px;">$${total}</b> 元。<br>
                    您今天購買的都是新北市在地特產，您達成的<b>【低碳減碳成就】</b>有：
                    <ul style="text-align:left; padding-left:20px;">
                        ${ecoStory}
                    </ul>
                </p>
                <h3 style="color:#219653; margin-bottom:0;">🌱 花仙子去味大師與 Coding101 聯名推薦：恭喜你成為新北減碳超人！ 🌱</h3>
            `;
            
            for(let i=0; i<15; i++) {
                setTimeout(createLeafEffect, i * 100);
            }
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
