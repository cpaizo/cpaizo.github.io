<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花仙子綠色永續生活：AI 新北低碳無人商店</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tfjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS 視覺裝潢：現代日式簡約與草樹綠森林風格 */
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f4f9f4;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            color: #27ae60;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
        }

        /* 左側：AI 鏡頭區 */
        .video-box {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 400px;
        }

        #webcam-container {
            width: 320px;
            height: 240px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 3px solid #27ae60;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* 互動大按鈕：滑鼠移上去會放大發光，點擊會彈跳 */
        .btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2);
        }

        .btn:hover {
            background-color: #219653;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(39, 174, 96, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* 右側：低碳購物車區 */
        .cart-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 450px;
            display: flex;
            flex-direction: column;
        }

        .status-badge {
            background-color: #e2f4e9;
            color: #27ae60;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .cart-title {
            font-size: 18px;
            font-weight: bold;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            margin-bottom: 15px;
            color: #34495e;
        }

        .cart-items {
            flex-grow: 1;
            min-height: 150px;
            max-height: 200px;
            overflow-y: auto;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed #f1f1f1;
        }

        /* 反悔按鈕：橘色溫和警告色 */
        .del-btn {
            background-color: #ffa64d;
            color: white;
            border: none;
            padding: 3px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .del-btn:hover { background-color: #e68a00; }

        .total-section {
            border-top: 2px solid #ecf0f1;
            padding-top: 15px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
        }

        .total-price {
            color: #e74c3c;
        }

        /* 驚艷全場：過戰成功的綠色大勳章卡片 */
        #esg-card {
            margin-top: 25px;
            background: linear-gradient(135deg, #eaf9f0 0%, #f4fbf7 100%);
            border: 2px dashed #27ae60;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            display: none;
            animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            width: 100%;
            max-width: 880px;
            box-sizing: border-box;
        }

        @keyframes cardPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 本地單機漂浮樹苗特效的粒子樣式 */
        .leaf-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 24px;
            animation: floatUp 1.2s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>🌿 花仙子永續生活：AI 新北低碳無人商店 🌿</h1>
    <div class="subtitle">新北在地就地取材 ｜ 零食物里程 ｜ 國小智慧科技綠色電商營隊</div>

    <div class="container">
        <div class="video-box">
            <div id="webcam-container"></div>
            <button class="btn" id="start-btn" onclick="init()">🔌 啟動 AI 綠色無人商店</button>
        </div>

        <div class="cart-box">
            <div class="status-badge" id="ai-status">📢 請先點擊按鈕啟動攝影機</div>
            <div class="cart-title">🛒 綠色消費低碳購物車</div>
            
            <div class="cart-items" id="cart-list">
                </div>

            <div class="total-section">
                <span>合計總金額：</span>
                <span class="total-price">NT$ <span id="total-amount">0</span> 元</span>
            </div>
            
            <button class="btn" style="margin-top:15px; background-color:#2f80ed; box-shadow:0 4px 6px rgba(47,128,237,0.2);" onclick="checkout()">🌱 完成新北低碳交易</button>
        </div>
    </div>

    <div id="esg-card"></div>

    <script>
        // 營運長與技術長設定：您的 Teachable Machine 線上大腦網址與水果資料庫
        const URL = "https://teachablemachine.withgoogle.com/models/V6Bl8_dTD/";
        const fruitDatabase = {
            "香蕉": { name: "🍌 烏來山區泉水現採香蕉", price: 20, eco: "支持烏來泰雅部落小農，在地運送零污染！" },
            "紅蘋果": { name: "🍎 淡水在地現摘高山紅蘋果", price: 25, eco: "淡水就地取材，免除跨國坐船海運排碳！" },
            "青蘋果": { name: "🍏 三芝海岸陽光脆甜青蘋果", price: 25, eco: "三芝海風灌溉，食物里程縮短 100 倍！" },
            "奇異果": { name: "🥝 烏來山區有機友善奇異果", price: 30, eco: "保護烏來森林水源，吃得健康又環保！" },
            "楊桃": { name: "🌟 八里觀音山左岸黃金楊桃", price: 20, eco: "八里直送，減少大卡車環島運送的廢氣！" }
        };

        let model, webcam, maxPredictions;
        let shoppingCart = {};
        let isCoolingDown = false; // 科技防暴走鎖定狀態

        // 初始化 AI 大腦與相機
        async function init() {
            document.getElementById("start-btn").innerText = "⏳ AI 正在開機連線中...";
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                // 正確排隊加載模型
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // 啟動相機設定
                const flip = true; 
                webcam = new tmImage.Webcam(320, 240, flip);
                await webcam.setup(); 
                await webcam.play();
                window.requestAnimationFrame(loop);

                document.getElementById("webcam-container").appendChild(webcam.canvas);
                document.getElementById("start-btn").style.display = "none";
                document.getElementById("ai-status").innerText = "🍏 偵測中...請把新北水果拿到鏡頭前！";
            } catch (error) {
                console.error(error);
                document.getElementById("start-btn").innerText = "🔌 啟動 AI 綠色無人商店";
                alert("相機或模型啟動失敗！請確認左上角有允許相機權限，且模型網址正確無誤。");
            }
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        // AI 即時預測畫面
        async function predict() {
            if (!model || !webcam) return;
            
            const prediction = await model.predict(webcam.canvas);
            let highestClass = "";
            let highestProbability = 0;

            // 抓出信心指數最高的類別
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestProbability) {
                    highestProbability = prediction[i].probability;
                    highestClass = prediction[i].className;
                }
            }

            // 如果辨識度大於 85%、不是「背景」，且目前沒有處於冷卻鎖定狀態
            if (highestProbability > 0.85 && highestClass !== "背景" && !isCoolingDown) {
                if (fruitDatabase[highestClass]) {
                    addToCart(highestClass);
                    triggerCoolDown(); // 感應成功，立刻啟動防暴走冷卻
                }
            }
        }

        // 防暴走冷卻機制：刷讀成功後鎖定大腦 2.5 秒，不重複洗版加錢
        function triggerCoolDown() {
            isCoolingDown = true;
            document.getElementById("ai-status").innerHTML = "⚡ 商品感應成功！大腦冷卻防呆中...";
            document.getElementById("ai-status").style.backgroundColor = "#ffeaa7";
            document.getElementById("ai-status").style.color = "#d63031";

            setTimeout(() => {
                isCoolingDown = false;
                document.getElementById("ai-status").innerHTML = "🍏 偵測中...請把新北水果拿到鏡頭前！";
                document.getElementById("ai-status").style.backgroundColor = "#e2f4e9";
                document.getElementById("ai-status").style.color = "#27ae60";
            }, 2500); 
        }

        // 將商品推入購物車
        function addToCart(label) {
            if (shoppingCart[label]) {
                shoppingCart[label].count++;
            } else {
                shoppingCart[label] = {
                    name: fruitDatabase[label].name,
                    price: fruitDatabase[label].price,
                    count: 1
                };
            }
            createLeafEffect(); // 噴散單機植物小樹苗
            renderCart();
        }

        // 反悔放回機制
        function decreaseItem(label) {
            if (shoppingCart[label]) {
                shoppingCart[label].count--;
                if (shoppingCart[label].count <= 0) {
                    delete shoppingCart[label];
                }
            }
            renderCart();
        }

        // 重新繪製購物車與金額
        function renderCart() {
            const cartList = document.getElementById("cart-list");
            cartList.innerHTML = "";
            let total = 0;

            for (let label in shoppingCart) {
                const item = shoppingCart[label];
                const rowTotal = item.price * item.count;
                total += rowTotal;

                const row = document.createElement("div");
                row.className = "item-row";
                row.innerHTML = `
                    <span>${item.name} <b>x${item.count}</b></span>
                    <div>
                        <span style="margin-right:10px;">$${rowTotal}</span>
                        <button class="del-btn" onclick="decreaseItem('${label}')">放回去 ↩</button>
                    </div>
                `;
                cartList.appendChild(row);
            }

            document.getElementById("total-amount").innerText = total;
        }

        // 特效長大絕招：漂浮樹苗與愛心粒子動畫
        function createLeafEffect() {
            const icons = ['🌱', '🌿', '💚', '☘️'];
            for (let i = 0; i < 6; i++) {
                const leaf = document.createElement('div');
                leaf.className = 'leaf-particle';
                leaf.innerText = icons[Math.floor(Math.random() * icons.length)];
                
                // 隨機在螢幕中中央區域噴散
                leaf.style.left = (window.innerWidth / 2 + (Math.random() * 200 - 100)) + 'px';
                leaf.style.top = (window.innerHeight / 2 + (Math.random() * 200 - 100)) + 'px';
                
                document.body.appendChild(leaf);
                setTimeout(() => leaf.remove(), 1200);
            }
        }

        // 完成低碳結帳：產出驚艷花仙子大長官的 ESG 證書卡片
        function checkout() {
            const total = document.getElementById("total-amount").innerText;
            if (total == "0") {
                alert("購物車還是空的，抓個新北水果來感應一下吧！");
                return;
            }

            let pName = prompt("請輸入您的名字（展現個人化驚艷感）：", "花仙子長官");
            if (!pName) pName = "低碳生活實踐者";

            // 動態撈出營運長的在地環保故事文案
            let ecoStory = "";
            for (let label in shoppingCart) {
                ecoStory += `<li><b>${shoppingCart[label].name}</b>：${fruitDatabase[label].eco}</li>`;
            }

            const card = document.getElementById("esg-card");
            card.style.display = "block";
            card.innerHTML = `
                <h2 style="color:#27ae60; margin-top:0;">🏆 花仙子綠色永續生活大師證書 🏆</h2>
                <p style="font-size:18px;">感謝 <b>【${pName}】</b> 總監參與新北市低碳在地消費！</p>
                <p style="font-size:16px; background:white; padding:15px; border-radius:10px; text-align:left; line-height:1.6;">
                    本次消費總金額為 <b style="color:#e74c3c; font-size:20px;">$${total}</b> 元。<br>
                    您今天購買的都是新北市在地特產，您達成的<b>【低碳減碳成就】</b>有：
                    <ul style="text-align:left; padding-left:20px;">
                        ${ecoStory}
                    </ul>
                </p>
                <h3 style="color:#219653; margin-bottom:0;">🌱 花仙子去味大師與 Coding101 聯名推薦：恭喜你成為新北減碳超人！ 🌱</h3>
            `;
            
            // 結帳大高潮：加碼連續爆發 15 次綠色特效
            for(let i=0; i<15; i++) {
                setTimeout(createLeafEffect, i * 100);
            }
            // 頁面流暢滾動到下方證書處
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
