<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花仙子綠色永續生活：AI 新北低碳無人商店</title>
    
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/1.3.1/tf.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    
    <script defer src="app.js"></script>
</head>
<body>

    <h1>🌿 花仙子永續生活：AI 新北低碳無人商店 🌿</h1>
    <div class="subtitle">新北在地就地取材 ｜ 零食物里程 ｜ 國小智慧科技綠色電商營隊</div>

    <div class="container">
        <div class="video-box">
            <div id="webcam-container">
                <div id="loading-text" style="padding: 20px; color: #7f8c8d; text-align: center; font-size: 14px;">📷 安全通道連線中，準備喚醒相機...</div>
            </div>
            <button class="btn" id="start-btn" style="display: none; background-color: #ffa64d;" onclick="initCameraFlow()">🔌 手動喚醒鏡頭選單</button>
            <div id="label-container">📢 AI 大腦數值區</div>
        </div>

        <div class="cart-box">
            <div class="status-badge" id="ai-status">📢 網頁安全載入中，請回應頂部的鏡頭選單...</div>
            <div class="cart-title">🛒 綠色消費低碳購物車</div>
            
            <div class="cart-items" id="cart-list"></div>

            <div class="total-section">
                <span>合計總金額：</span>
                <span class="total-price">NT$ <span id="total-amount">0</span> 元</span>
            </div>
            
            <div class="btn-group">
                <button class="btn" style="background-color:#2f80ed; box-shadow:0 4px 6px rgba(47,128,237,0.2); margin-bottom: 0;" onclick="checkout()">🌱 完成新北低碳交易</button>
                <button class="btn" style="background-color:#27ae60; box-shadow:0 4px 6px rgba(39,174,96,0.2); margin-bottom: 0;" onclick="startNewTransaction()">🔄 開啟新交易 (清空)</button>
            </div>
        </div>
    </div>

    <div id="esg-card"></div>

</body>
</html>
