<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 互動粉彩虹月曆</title>
    <style>
        :root {
            --pink-rainbow: linear-gradient(120deg, #ff9a9e 0%, #fecfef 20%, #feada6 40%, #fbc2eb 60%, #a18cd1 80%, #fad0c4 100%);
            --glass: rgba(255, 255, 255, 0.6);
            --text-color: #6d4c41;
            --holiday-red: #ff5252;
            /* 今天：立體粉紅漸層 */
            --today-grad: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: var(--pink-rainbow);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .floating-icon {
            position: fixed;
            color: rgba(255, 255, 255, 0.5);
            font-size: 24px;
            z-index: -1;
            pointer-events: none;
            animation: fly linear infinite;
        }

        @keyframes fly {
            from { transform: translate(-100px, 0) rotate(0deg); }
            to { transform: translate(calc(100vw + 100px), calc(100vh * 0.3)) rotate(360deg); }
        }

        h1 {
            text-align: center;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 2.5em;
            margin-bottom: 30px;
        }

        .calendar-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .month-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .month-title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed rgba(255,255,255,0.8);
        }

        table { width: 100%; border-collapse: collapse; }
        th { font-size: 13px; color: #8d6e63; padding-bottom: 10px; }
        
        td {
            text-align: center;
            height: 42px;
            font-size: 15px;
            color: var(--text-color);
            position: relative;
            border-radius: 12px;
            cursor: default;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 彈性縮放效果 */
        }

        /* 鼠标懸停效果：動一下 */
        td:hover:not(:empty) {
            transform: scale(1.3) translateY(-5px);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .weekend { color: var(--holiday-red); }
        .holiday { color: var(--holiday-red); font-weight: bold; }
        
        .holiday-name {
            font-size: 9px;
            display: block;
            line-height: 1;
            margin-top: 1px;
        }

        /* 今日日期：凸出感設計 */
        .is-today {
            background: var(--today-grad) !important;
            color: white !important;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(255, 117, 140, 0.5);
            transform: scale(1.15);
            z-index: 2;
        }

        .is-today .holiday-name { color: white; }

        @media (max-width: 900px) { .calendar-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .calendar-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <h1>✨ 2026 Dreamy Rainbow ✨</h1>
    <div id="calendar-grid" class="calendar-container"></div>

    <script>
        const now = new Date();
        const curYear = now.getFullYear();
        const curMonth = now.getMonth() + 1;
        const curDate = now.getDate();

        const holidays = {
            "1-1": "元旦", "2-16": "除夕", "2-17": "春節", "2-18": "初二", "2-19": "初三",
            "2-28": "二二八", "4-4": "兒童節", "4-5": "清明節", "5-1": "勞動節",
            "6-19": "端午節", "9-25": "中秋節", "10-10": "國慶日"
        };

        const icons = ['☁️', '🌸', '✨', '💖', '🍭', '🎈'];
        function createFloatingIcons() {
            for (let i = 0; i < 15; i++) {
                const span = document.createElement('span');
                span.className = 'floating-icon';
                span.innerText = icons[Math.floor(Math.random() * icons.length)];
                span.style.top = Math.random() * 100 + 'vh';
                span.style.left = '-60px';
                span.style.animationDuration = (Math.random() * 12 + 8) + 's';
                span.style.animationDelay = (Math.random() * 8) + 's';
                document.body.appendChild(span);
            }
        }

        const grid = document.getElementById('calendar-grid');
        for (let m = 0; m < 12; m++) {
            const card = document.createElement('div');
            card.className = 'month-card';
            
            let html = `<div class="month-title">${m + 1}月</div>`;
            html += `<table><thead><tr><th class="weekend">日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th class="weekend">六</th></tr></thead><tbody><tr>`;
            
            const firstDay = new Date(2026, m, 1).getDay();
            const days = new Date(2026, m + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) html += '<td></td>';
            
            for (let d = 1; d <= days; d++) {
                const dateKey = `${m + 1}-${d}`;
                const holiday = holidays[dateKey];
                const dayOfWeek = new Date(2026, m, d).getDay();
                
                let classes = [];
                if (dayOfWeek === 0 || dayOfWeek === 6) classes.push('weekend');
                if (holiday) classes.push('holiday');
                
                if (curYear === 2026 && (m + 1) === curMonth && d === curDate) {
                    classes.push('is-today');
                }

                html += `<td class="${classes.join(' ')}">
                            ${d}
                            ${holiday ? `<span class="holiday-name">${holiday}</span>` : ''}
                         </td>`;
                
                if ((d + firstDay) % 7 === 0) html += '</tr><tr>';
            }
            html += '</tr></tbody></table>';
            card.innerHTML = html;
            grid.appendChild(card);
        }

        createFloatingIcons();
    </script>
</body>
</html>
