<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 喵喵部屋 | 遇見你的專屬主子 🐾</title>
    <style>
        /* 甜美風核心配色與字體 */
        body {
            font-family: 'Segoe UI', Microsoft JhengHei, sans-serif;
            color: #5a4b41;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            position: relative;
            
            /* 您指定的布偶貓背景圖片 */
            background-image: url('https://88db.website-jp-osa-1.linodeobjects.com/329075/l_e4d6b146-5ce5-482e-895d-bfbe9a9df7b8.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* 讓背景固定，滾動時只有內容移動 */
        }

        /* 背景飄落物樣式 */
        .snowflake {
            position: fixed;
            top: -10px;
            pointer-events: none;
            z-index: 9999;
            animation: fall linear forwards;
            opacity: 0.6;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) translateX(20px) rotate(360deg);
            }
        }

        header {
            /* 加上半透明的甜美粉色，確保文字清晰 */
            background-color: rgba(255, 183, 178, 0.85);
            backdrop-filter: blur(5px); /* 微妙的毛玻璃效果 */
            color: white;
            text-align: center;
            padding: 2.5rem 1rem;
            box-shadow: 0 4px 15px rgba(255, 183, 178, 0.3);
            position: relative;
            overflow: hidden;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.15);
            animation: heartBeat 2s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.05); }
            28% { transform: scale(1); }
            42% { transform: scale(1.05); }
            70% { transform: scale(1); }
        }

        header p {
            margin: 0.5rem 0 0 0;
            font-size: 1.1rem;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* 優惠公告區 */
        .promo-banner {
            grid-column: 1 / -1;
            background-color: rgba(255, 229, 236, 0.9);
            backdrop-filter: blur(5px);
            border: 2px dashed #ff85a1;
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
            font-weight: bold;
            color: #ff477e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* 商品列表區 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            /* 調整為半透明純白，透出後方漂亮的貓咪背景 */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s, background 0.3s;
            border: 1px solid rgba(255, 227, 227, 0.5);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 12px 25px rgba(255, 183, 178, 0.4);
        }

        .product-icon {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            transition: transform 0.3s;
        }
        
        .product-card:hover .product-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0.5rem 0;
            color: #6d594f;
        }

        .product-price {
            color: #ff7096;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .btn-add {
            background-color: #ffb7b2;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .btn-add:hover {
            background-color: #ff9aa2;
        }

        .btn-add:active {
            transform: scale(0.95);
        }

        /* 購物車區塊 */
        .cart-sidebar {
            /* 調整為半透明純白 */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            height: fit-content;
            border: 1px solid rgba(255, 227, 227, 0.5);
            position: sticky;
            top: 2rem;
        }

        .cart-title {
            font-size: 1.3rem;
            border-bottom: 2px solid #ffe5ec;
            padding-bottom: 0.5rem;
            margin-top: 0;
            color: #6d594f;
        }

        .cart-items {
            list-style: none;
            padding: 0;
            margin: 1rem 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            flex-direction: column;
            padding: 0.8rem 0;
            border-bottom: 1px dashed #ffe5ec;
            font-size: 0.95rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item-name {
            font-weight: bold;
            color: #6d594f;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.4rem;
        }

        .btn-qty {
            background-color: #ffe5ec;
            color: #ff477e;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-qty:hover {
            background-color: #ffb7b2;
            color: white;
        }

        .btn-qty:active {
            transform: scale(0.85);
        }

        .item-qty {
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }

        .item-price-detail {
            color: #ff7096;
            font-size: 0.9rem;
        }

        /* 摘要計算區 */
        .cart-item-summary {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid #ffe5ec;
        }

        .summary-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
        }

        .discount-text {
            color: #ff477e;
            font-weight: bold;
            animation: popIn 0.3s ease-out;
        }

        .gift-text {
            color: #2a9d8f;
            font-weight: bold;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .total-price {
            font-size: 1.4rem;
            color: #ff7096;
            font-weight: bold;
            display: inline-block;
        }

        .bump {
            animation: priceBump 0.3s ease-out;
        }

        @keyframes priceBump {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #ff477e; }
            100% { transform: scale(1); }
        }

        /* 按鈕群組 */
        .cart-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-clear {
            background-color: #f4f1de;
            color: #706654;
            border: none;
            padding: 0.8rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-clear:hover {
            background-color: #e0dbcd;
        }

        .btn-checkout {
            background-color: #ff85a1;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .btn-checkout:hover {
            background-color: #ff477e;
            box-shadow: 0 4px 12px rgba(255, 71, 126, 0.3);
        }

        .flying-item {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 10000;
            transition: all 0.6s cubic-bezier(0.13, 0.74, 0.33, 0.95);
        }
    </style>
</head>
<body>

    <header>
        <h1>🐾 喵喵部屋 🐾</h1>
        <p>尋找與你命定相遇的可愛主子與萌物</p>
    </header>

    <div class="container">
        <div class="promo-banner">
            💖 開幕慶甜蜜好康：滿 $40,000 享 95 折！ | 買任意 2 隻貓咪送「豪華貓窩」 | 買 3 隻(含)以上送「專用美毛梳」！
        </div>

        <div class="product-grid">
            <div class="product-card">
                <div class="product-icon">🐱</div>
                <div class="product-name">布偶貓</div>
                <div class="product-price">$30,000</div>
                <button class="btn-add" onclick="handleAddToCart(event, 1, '布偶貓', 30000, true)">加入購物車</button>
            </div>
            <div class="product-card">
                <div class="product-icon">🐈</div>
                <div class="product-name">緬因貓</div>
                <div class="product-price">$20,000</div>
                <button class="btn-add" onclick="handleAddToCart(event, 2, '緬因貓', 20000, true)">加入購物車</button>
            </div>
            <div class="product-card">
                <div class="product-icon">🦁</div>
                <div class="product-name">英國短毛貓</div>
                <div class="product-price">$10,000</div>
                <button class="btn-add" onclick="handleAddToCart(event, 3, '英國短毛貓', 10000, true)">加入購物車</button>
            </div>
            <div class="product-card">
                <div class="product-icon">🐯</div>
                <div class="product-name">美國短毛貓</div>
                <div class="product-price">$50,000</div>
                <button class="btn-add" onclick="handleAddToCart(event, 4, '美國短毛貓', 50000, true)">加入購物車</button>
            </div>
            <div class="product-card">
                <div class="product-icon">🏰</div>
                <div class="product-name">攀爬架</div>
                <div class="product-price">$200</div>
                <button class="btn-add" onclick="handleAddToCart(event, 5, '攀爬架', 200, false)">加入購物車</button>
            </div>
        </div>

        <div class="cart-sidebar" id="cart-sidebar">
            <h3 class="cart-title">🛒 購物清單明細</h3>
            <ul class="cart-items" id="cart-items">
                <li style="color: #6d594f; text-align: center; list-style: none; margin-top: 1rem; font-weight: bold;">購物車空空如也 🐾</li>
            </ul>

            <div class="cart-item-summary">
                <div class="summary-line">
                    <span>原始總計:</span>
                    <span id="raw-total">$0</span>
                </div>
                <div class="summary-line discount-text" id="discount-row" style="display: none;">
                    <span>滿額折扣 (95折):</span>
                    <span id="discount-amount">-$0</span>
                </div>
                <div class="summary-line gift-text" id="gift-row" style="display: none;">
                    <span>獲得贈品:</span>
                    <span id="gift-name">無</span>
                </div>
                <div class="summary-line" style="font-weight: bold; margin-top: 0.5rem;">
                    <span>應付金額:</span>
                    <span class="total-price" id="final-total">$0</span>
                </div>
            </div>

            <div class="cart-buttons">
                <button class="btn-clear" onclick="clearCart()">清空</button>
                <button class="btn-checkout" onclick="checkout()">結帳</button>
            </div>
        </div>
    </div>

    <script>
        // 初始化 Web Audio API 上下文
        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        // 音效合成函式庫
        function playSound(type) {
            try {
                const ctx = getAudioContext();
                if (ctx.state === 'suspended') ctx.resume();

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                const now = ctx.currentTime;

                if (type === 'add') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(587.33, now); 
                    osc.frequency.setValueAtTime(880, now + 0.08); 
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } 
                else if (type === 'remove') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.exponentialRampToValueAtTime(220, now + 0.15);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                } 
                else if (type === 'clear') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.linearRampToValueAtTime(80, now + 0.4);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0.001, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                } 
                else if (type === 'success') {
                    const notes = [523.25, 659.25, 783.99, 1046.50];
                    notes.forEach((freq, index) => {
                        const noteOsc = ctx.createOscillator();
                        const noteGain = ctx.createGain();
                        noteOsc.connect(noteGain);
                        noteGain.connect(ctx.destination);
                        
                        noteOsc.type = 'sine';
                        noteOsc.frequency.setValueAtTime(freq, now + index * 0.1);
                        noteGain.gain.setValueAtTime(0.12, now + index * 0.1);
                        noteGain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.1 + 0.2);
                        
                        noteOsc.start(now + index * 0.1);
                        noteOsc.stop(now + index * 0.1 + 0.2);
                    });
                }
            } catch (e) {
                console.log("瀏覽器阻擋音效：", e);
            }
        }

        // 儲存購物車資料
        let cart = {};

        // 處理加入購物車
        function handleAddToCart(event, id, name, price, isCat) {
            createFlyingItem(event, '🐾');
            playSound('add');
            
            setTimeout(() => {
                if (cart[id]) {
                    cart[id].quantity += 1;
                } else {
                    cart[id] = { name, price, quantity: 1, isCat };
                }
                updateCartUI();
                triggerPriceBump();
            }, 100);
        }

        // 商品飛入購物車動畫
        function createFlyingItem(event, icon) {
            const flyer = document.createElement('div');
            flyer.className = 'flying-item';
            flyer.innerText = icon;
            document.body.appendChild(flyer);

            flyer.style.left = event.clientX + 'px';
            flyer.style.top = event.clientY + 'px';

            const cartSidebar = document.getElementById('cart-sidebar');
            const rect = cartSidebar.getBoundingClientRect();
            
            setTimeout(() => {
                flyer.style.left = (rect.left + 30) + 'px';
                flyer.style.top = (rect.top + 30) + 'px';
                flyer.style.transform = 'scale(0.3) rotate(720deg)';
                flyer.style.opacity = '0';
            }, 10);

            setTimeout(() => { flyer.remove(); }, 600);
        }

        // 修改數量
        function changeQuantity(id, amount) {
            if (!cart[id]) return;
            
            if (amount > 0) {
                playSound('add');
            } else {
                playSound('remove');
            }

            cart[id].quantity += amount;
            if (cart[id].quantity <= 0) {
                delete cart[id];
            }
            updateCartUI();
            triggerPriceBump();
        }

        // 清空購物車
        function clearCart() {
            if (Object.keys(cart).length === 0) return;
            playSound('clear');
            cart = {};
            updateCartUI();
            triggerPriceBump();
        }

        // 價格彈跳動畫
        function triggerPriceBump() {
            const finalTotalSpan = document.getElementById('final-total');
            finalTotalSpan.classList.remove('bump');
            void finalTotalSpan.offsetWidth; 
            finalTotalSpan.classList.add('bump');
        }

        // 更新購物車 UI
        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cart-items');
            cartItemsContainer.innerHTML = '';

            let rawTotal = 0;
            let catCount = 0;
            let hasItems = false;

            for (let id in cart) {
                hasItems = true;
                const item = cart[id];
                const itemTotal = item.price * item.quantity;
                rawTotal += itemTotal;
                
                if (item.isCat) {
                    catCount += item.quantity;
                }

                const li = document.createElement('li');
                li.className = 'cart-item';
                li.innerHTML = `
                    <div class="cart-item-row">
                        <span class="cart-item-name">${item.name}</span>
                        <span class="item-price-detail">$${itemTotal.toLocaleString()}</span>
                    </div>
                    <div class="cart-item-controls">
                        <button class="btn-qty" onclick="changeQuantity('${id}', -1)">-</button>
                        <span class="item-qty">${item.quantity}</span>
                        <button class="btn-qty" onclick="changeQuantity('${id}', 1)">+</button>
                    </div>
                `;
                cartItemsContainer.appendChild(li);
            }

            if (!hasItems) {
                cartItemsContainer.innerHTML = '<li style="color: #6d594f; text-align: center; list-style: none; margin-top: 1rem; font-weight: bold;">購物車空空如也 🐾</li>';
            }

            let finalTotal = rawTotal;
            const discountRow = document.getElementById('discount-row');
            if (rawTotal >= 40000) {
                const discount = Math.round(rawTotal * 0.05);
                finalTotal = rawTotal - discount;
                document.getElementById('discount-amount').innerText = `-$${discount.toLocaleString()}`;
                if(discountRow.style.display === 'none') discountRow.style.display = 'flex';
            } else {
                discountRow.style.display = 'none';
            }

            const giftRow = document.getElementById('gift-row');
            const giftNameSpan = document.getElementById('gift-name');
            if (catCount === 2) {
                giftNameSpan.innerText = '🎁 貓窩 1 個';
                if(giftRow.style.display === 'none') giftRow.style.display = 'flex';
            } else if (catCount >= 3) {
                giftNameSpan.innerText = '🎁 梳子 1 支';
                if(giftRow.style.display === 'none') giftRow.style.display = 'flex';
            } else {
                giftRow.style.display = 'none';
            }

            document.getElementById('raw-total').innerText = `$${rawTotal.toLocaleString()}`;
            document.getElementById('final-total').innerText = `$${finalTotal.toLocaleString()}`;
        }

        // 結帳
        function checkout() {
            if (Object.keys(cart).length === 0) {
                alert('您的購物車還是空的喔！快去選購可愛的貓咪吧 🐾');
                return;
            }
            
            playSound('success');
            
            const finalPrice = document.getElementById('final-total').innerText;
            const giftText = document.getElementById('gift-row').style.display === 'flex' ? 
                             `\n包含贈品：${document.getElementById('gift-name').innerText}` : '';
            
            setTimeout(() => {
                alert(`🎉 結帳成功！\n感謝您的購買，本次消費總計為 ${finalPrice}${giftText}\n我們會滿懷愛心地準備您的訂單 💖`);
                cart = {};
                updateCartUI();
                triggerPriceBump();
            }, 100);
        }

        // 背景甜蜜飄落物特效
        function createFallingEffects() {
            const icons = ['🌸', '✨', '💖', '🐾'];
            setInterval(() => {
                const snowflake = document.createElement('div');
                snowflake.className = 'snowflake';
                snowflake.innerText = icons[Math.floor(Math.random() * icons.length)];
                snowflake.style.left = Math.random() * 100 + 'vw';
                snowflake.style.fontSize = Math.random() * 15 + 10 + 'px';
                snowflake.style.animationDuration = Math.random() * 3 + 4 + 's';
                document.body.appendChild(snowflake);
                setTimeout(() => { snowflake.remove(); }, 7000);
            }, 600);
        }

        window.onload = createFallingEffects;
    </script>
</body>
</html>
