<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 全年行事曆</title>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* 12個月的網格佈局 */
        .year-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .month-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 15px;
            transition: transform 0.2s;
        }

        .month-card:hover {
            transform: translateY(-5px);
        }

        .month-title {
            text-align: center;
            font-size: 1.4rem;
            color: #4a90e2;
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 8px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
        }

        .weekday {
            font-weight: bold;
            font-size: 0.8rem;
            color: #7f8c8d;
            padding-bottom: 10px;
        }

        .day {
            padding: 8px 0;
            font-size: 0.9rem;
            border-radius: 6px;
        }

        /* 周末標色 */
        .day:nth-child(7n), .day:nth-child(7n-6) {
            color: #e74c3c;
        }

        .empty {
            background: none;
        }

        /* 標示今天 */
        .today {
            background-color: #4a90e2 !important;
            color: white !important;
            font-weight: bold;
        }

        @media print {
            .month-card { box-shadow: none; border: 1px solid #ddd; }
            body { background: white; }
        }
    </style>
</head>
<body>

    <h1>🗓️ 2026 年度行事曆</h1>

    <div class="year-container" id="yearBox"></div>

    <script>
        const yearBox = document.getElementById('yearBox');
        const year = 2026;
        const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
        const weekNames = ["日", "一", "二", "三", "四", "五", "六"];
        const today = new Date();

        for (let m = 0; m < 12; m++) {
            // 建立月份卡片
            let monthCard = document.createElement('div');
            monthCard.className = 'month-card';

            // 標題
            let title = `<div class="month-title">${monthNames[m]}</div>`;
            
            // 星期頭
            let grid = `<div class="calendar-grid">`;
            weekNames.forEach(w => grid += `<div class="weekday">${w}</div>`);

            // 計算日期
            let firstDay = new Date(year, m, 1).getDay();
            let daysInMonth = new Date(year, m + 1, 0).getDate();

            // 填充月初空白
            for (let i = 0; i < firstDay; i++) {
                grid += `<div class="day empty"></div>`;
            }

            // 填充日期
            for (let d = 1; d <= daysInMonth; d++) {
                let isToday = (year === today.getFullYear() && m === today.getMonth() && d === today.getDate()) ? 'today' : '';
                grid += `<div class="day ${isToday}">${d}</div>`;
            }

            grid += `</div>`;
            monthCard.innerHTML = title + grid;
            yearBox.appendChild(monthCard);
        }
    </script>
</body>
</html>
