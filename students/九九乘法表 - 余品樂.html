<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九九乘法表</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        /* 使用 Grid 佈局 */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }

        /* 每一欄數字的卡片樣式 */
        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid #4CAF50;
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: #4CAF50;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .item {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #555;
        }

        /* 讓滑鼠移上去時有互動感 */
        .card:hover {
            transform: translateY(-5px);
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <h1>九九乘法表</h1>

    <div class="container" id="table-container">
        </div>

    <script>
        const container = document.getElementById('table-container');

        // 迴圈生成 1 到 9 的卡片
        for (let i = 1; i <= 9; i++) {
            let card = document.createElement('div');
            card.className = 'card';
            
            let title = `<h3>乘數 ${i}</h3>`;
            let content = '';

            for (let j = 1; j <= 9; j++) {
                // 補零判斷（可選）：讓排版更整齊，例如 1 x 1 = 01
                let result = i * j;
                content += `<div class="item">${i} × ${j} = ${result}</div>`;
            }

            card.innerHTML = title + content;
            container.appendChild(card);
        }
    </script>

</body>
</html>
