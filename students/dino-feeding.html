<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦕 恐龍餵食秀 - 長度與加法大挑戰 🌿</title>
    <style>
        :root {
            --unit-width: 35px; /* 每 1 個長度單位的寬度 */
        }
        
        body {
            background-color: #E8F5E9; /* 叢林淡綠色 */
            background-image: radial-gradient(#C8E6C9 20%, transparent 20%),
                              radial-gradient(#C8E6C9 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            font-family: 'Comic Sans MS', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #2E7D32;
            overflow-x: hidden;
        }

        h1 {
            color: #1B5E20;
            text-shadow: 2px 2px 0px #FFF, 4px 4px 0px #A5D6A7;
            font-size: 2.3rem;
            margin-bottom: 5px;
            text-align: center;
        }

        p.subtitle {
            font-size: 1.1rem;
            background: #FFF;
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 2px dashed #4CAF50;
            margin-bottom: 20px;
            text-align: center;
        }

        .game-container {
            display: flex;
            gap: 25px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(46, 125, 50, 0.15);
            border: 4px solid #C8E6C9;
            flex: 1;
            min-width: 350px;
        }

        h2 {
            text-align: center;
            color: #2E7D32;
            font-size: 1.4rem;
            margin-top: 0;
            border-bottom: 3px dotted #A5D6A7;
            padding-bottom: 10px;
        }

        .dino-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        /* 恐龍頭部轉向右邊的核心 CSS */
        .dino-avatar {
            font-size: 5.5rem;
            display: inline-block;
            transition: transform 0.2s;
            user-select: none;
            transform: scaleX(-1); /* ⭐ 翻轉魔法：讓恐龍面朝右邊看食物 */
        }

        .bubble {
            position: relative;
            background: #FFF;
            border: 3px solid #4CAF50;
            border-radius: 15px;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #1B5E20;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            text-align: center;
        }
        .bubble:after, .bubble:before {
            top: 100%; left: 50%; border: solid transparent; content: " "; height: 0; width: 0; position: absolute; pointer-events: none;
        }
        .bubble:after { border-color: rgba(255, 255, 255, 0); border-top-color: #FFF; border-width: 10px; margin-left: -10px; }
        .bubble:before { border-color: rgba(76, 175, 80, 0); border-top-color: #4CAF50; border-width: 14px; margin-left: -14px; }

        .food-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .food-btn {
            background: #FFF;
            border: 3px solid #81C784;
            border-radius: 15px;
            padding: 10px 20px;
            cursor: pointer;
            box-shadow: 0 4px 0 #388E3C;
            transition: transform 0.1s;
            width: 85%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: #2E7D32;
        }
        .food-btn:hover { transform: scale(1.02); background: #F1F8E9; }
        .food-btn:active { transform: translateY(4px); box-shadow: 0 0px 0 #388E3C; }

        .feeding-stage {
            display: flex;
            flex-direction: column;
            gap: 25px;
            background: #FFF;
            border-radius: 20px;
            border: 3px inset #C8E6C9;
            padding: 25px;
            position: relative;
        }

        .track-row {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 100%;
        }

        .track-name {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 6px;
            color: #558B2F;
        }

        .trough-line {
            display: flex;
            align-items: center;
            justify-content: flex-start; 
            width: 100%;
            height: 45px;
            background: #F1F8E9;
            border-left: 6px solid #81C784; 
            border-radius: 0 8px 8px 0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .target-grass {
            height: 75%;
            background: linear-gradient(to right, #A5D6A7, #66BB6A);
            border: 2px solid #388E3C;
            border-radius: 0 6px 6px 0;
            display: flex;
            align-items: center;
            padding-left: 10px;
            color: #1B5E20;
            font-weight: bold;
            font-size: 1.2rem;
            transition: width 0.3s ease;
            box-sizing: border-box;
        }

        .food-chain {
            display: flex;
            flex-direction: row; 
            height: 75%;
            transition: width 1s cubic-bezier(0.55, 0.085, 0.68, 0.53); 
        }

        .grass-block {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            box-sizing: border-box;
            border: 2px solid rgba(255,255,255,0.4);
            border-left: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            animation: slideIn 0.25s ease-out;
        }

        @keyframes slideIn {
            0% { transform: translateX(-20px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .bg-small { background: linear-gradient(to right, #9CCC65, #7CB342); }
        .bg-medium { background: linear-gradient(to right, #4CAF50, #43A047); }

        .control-panel {
            text-align: center;
            margin-top: 20px;
        }

        .btn-action {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 0 #2E7D32;
            margin: 5px;
        }
        .btn-action:hover { background: #43A047; }
        .btn-action:active { transform: translateY(5px); box-shadow: 0 0px 0 #2E7D32; }
        .btn-reset { background: #888; box-shadow: 0 5px 0 #555; }

        .success-mask {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 15px;
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .success-mask h3 { color: #2E7D32; font-size: 2.2rem; margin: 0 0 10px 0; }

        /* ---------------- [動畫特效區] ---------------- */
        
        /* 1. 答對後恐龍開心地上下跳舞（保留向右翻轉） */
        .dino-dance-anim {
            animation: dinoJump 0.4s infinite alternate ease-in-out;
        }
        @keyframes dinoJump {
            0% { transform: translateY(0) scaleX(-1) scale(1); }
            100% { transform: translateY(-20px) scaleX(-1) scale(1.05); }
        }

        /* 2. 檢查答案時，恐龍張嘴大口咀嚼（保留向右翻轉並微震動） */
        .dino-chomp-anim {
            animation: dinoChomp 0.15s infinite alternate;
        }
        @keyframes dinoChomp {
            0% { transform: scaleX(-1) scale(1.1) rotate(0deg); }
            50% { transform: scaleX(-1) scale(1.2) rotate(-5deg); }
            100% { transform: scaleX(-1) scale(1.1) rotate(5deg); }
        }
    </style>
</head>
<body>

    <h1>🦕 恐龍餵食秀 - 長度與加法大挑戰 🌿</h1>
    <p class="subtitle">看清小恐龍想吃的食物長度，用下面的牧草拼出「剛好一樣長」的長條吧！</p>

    <div class="game-container">
        <div class="card">
            <div class="dino-area">
                <div class="bubble" id="dino-bubble">我今天想吃長度 8 的超級大牧草！</div>
                <div class="dino-avatar" id="dino-character">🦕</div>
            </div>
            
            <h2>🌿 採集小組的食物籃</h2>
            <div class="food-menu">
                <button class="food-btn" onclick="addFood('small', 3)">
                    <span>🌱 小牧草 (長度 3)</span>
                    <span style="color:#7CB342;">■■■</span>
                </button>
                <button class="food-btn" onclick="addFood('medium', 5)">
                    <span>🌿 中牧草 (長度 5)</span>
                    <span style="color:#43A047;">■■■■■</span>
                </button>
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <button class="btn-action" style="background-color: #00897B; box-shadow: 0 5px 0 #00695C;" onclick="generateChallenge()">🎲 換一隻恐龍（隨機出題）</button>
            </div>
        </div>

        <div class="card" style="position: relative;">
            <h2>⚖️ 餵食槽長度比一比</h2>
            
            <div class="feeding-stage">
                <div class="success-mask" id="success-screen">
                    <h3>🎉 餵食成功！吼～ 🎉</h3>
                    <p id="success-text" style="font-size: 1.3rem; font-weight: bold; color: #1B5E20; margin-bottom: 20px;"></p>
                    <button class="btn-action" onclick="generateChallenge()">🎯 挑戰下一隻恐龍</button>
                </div>

                <div class="track-row">
                    <div class="track-name" id="target-title">🎯 恐龍指定的超級大牧草：長度 8</div>
                    <div class="trough-line">
                        <div id="target-bar" class="target-grass">8</div>
                    </div>
                </div>

                <div class="track-row">
                    <div class="track-name" id="current-title">📏 你餵進去的總長度：0</div>
                    <div class="trough-line">
                        <div id="player-food-chain" class="food-chain"></div>
                    </div>
                </div>
            </div>

            <div class="control-panel">
                <button class="btn-action" id="btn-submit" onclick="checkFeeding()">😋 送進嘴巴（檢查長度）</button>
                <button class="btn-action btn-reset" onclick="resetGame()">🔄 收回重新拼</button>
            </div>
        </div>
    </div>

    <script>
        let targetValue = 8;
        let currentStack = []; 
        let audioCtx = null;
        
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                utterance.rate = 1.0;
                utterance.pitch = 1.3; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // 模擬連續咀嚼音效
        function playChompSound(durationMs) {
            if (!window.AudioContext && !window.webkitAudioContext) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            let count = Math.floor(durationMs / 120);
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    if (!audioCtx) return;
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(450 - (Math.random() * 100), audioCtx.currentTime);
                    gain.connect(audioCtx.destination);
                    osc.connect(gain);
                    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.09);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.09);
                }, i * 120);
            }
            setTimeout(() => { if (audioCtx && audioCtx.state !== 'closed') audioCtx.close(); }, durationMs + 200);
        }

        // 精準抓取 CSS 單元寬度，排除 10格寬度不一致的 bug
        function varUnitWidth() {
            const rootStyles = getComputedStyle(document.documentElement);
            return parseInt(rootStyles.getPropertyValue('--unit-width')) || 35;
        }

        function generateChallenge() {
            let lastTarget = targetValue;
            while (targetValue === lastTarget) {
                targetValue = Math.floor(Math.random() * 8) + 3; // 隨機隨出 3 ~ 10 的數字
            }

            const targetBar = document.getElementById('target-bar');
            targetBar.style.width = `${targetValue * varUnitWidth()}px`;
            targetBar.innerText = targetValue;
            
            document.getElementById('target-title').innerText = `🎯 恐龍指定的超級大牧草：長度 ${targetValue}`;
            document.getElementById('dino-bubble').innerText = `我今天想吃長度 ${targetValue} 的超級大牧草！`;
            
            resetGame();
            setTimeout(() => { speak(`我今天想吃長度 ${targetValue} 的超級大牧草，快餵我！`); }, 300);
        }

        function addFood(type, val) {
            const currentSum = currentStack.reduce((a, b) => a + b, 0);
            if (currentSum + val > 12) {
                alert("哇！餵太多了，餵食槽塞不下囉！");
                speak("塞不下囉！");
                return;
            }
            
            // 點選小音效
            if (!window.AudioContext && !window.webkitAudioContext) {} else {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator(); let g = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(500, ctx.currentTime);
                osc.connect(g); g.connect(ctx.destination);
                g.gain.setValueAtTime(0.05, ctx.currentTime); g.gain.linearRampToValueAtTime(0, ctx.currentTime+0.05);
                osc.start(); osc.stop(ctx.currentTime+0.05);
            }

            if (type === 'small') speak("長度三");
            if (type === 'medium') speak("長度五");

            currentStack.push(val);
            renderTrough();
        }

        function renderTrough() {
            const container = document.getElementById('player-food-chain');
            container.innerHTML = '';
            let total = 0;
            currentStack.forEach(val => {
                total += val;
                const block = document.createElement('div');
                block.className = `grass-block ${val === 3 ? 'bg-small' : 'bg-medium'}`;
                block.style.width = `${val * varUnitWidth()}px`;
                block.innerText = val;
                container.appendChild(block);
            });
            
            container.style.width = "auto";
            document.getElementById('current-title').innerText = `📏 你餵進去的總長度：${total}`;
        }

        // --- 核心：吃草與判定 ---
        function checkFeeding() {
            const currentSum = currentStack.reduce((a, b) => a + b, 0);
            const dino = document.getElementById('dino-character');
            const foodChain = document.getElementById('player-food-chain');
            
            if (currentSum === 0) { speak("你還沒有放任何牧草喔！"); return; }

            // 1. 啟動咀嚼動畫
            dino.className = "dino-avatar dino-chomp-anim";
            playChompSound(1000);

            if (currentSum === targetValue) {
                // 長度正確：食物往左邊縮小消失
                foodChain.style.width = "0px";
                
                setTimeout(() => {
                    // 2. 切換為跳舞動畫
                    dino.className = "dino-avatar dino-dance-anim";
                    
                    let formulaStr = currentStack.join('加');
                    document.getElementById('success-text').innerText = currentStack.join(' + ') + ` 剛好等於 ${targetValue}！`;
                    document.getElementById('success-screen').style.display = 'flex';
                    speak(`吼～謝謝你！${formulaStr}剛好等於${targetValue}，我吃得好飽、好開心喔！`);
                }, 1000);

            } else {
                // 長度錯誤：吐出來不消失
                setTimeout(() => {
                    dino.className = "dino-avatar"; // 恢復原狀
                    if (currentSum < targetValue) {
                        speak(`目前的總長度是 ${currentSum}。嗯……小恐龍嚼了嚼，肚子還沒飽，再加一截牧草吧！`);
                    } else {
                        speak(`目前的總長度是 ${currentSum}。哎呀，太長了！小恐龍吞不下去，按收回重新拼試試看。`);
                    }
                }, 1000);
            }
        }

        function resetGame() {
            currentStack = [];
            renderTrough();
            document.getElementById('success-screen').style.display = 'none';
            document.getElementById('dino-character').className = 'dino-avatar';
        }

        window.onload = function() {
            generateChallenge();
        }
    </script>
</body>
</html>
