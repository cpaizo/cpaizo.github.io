<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藍綠漸層背景</title>
    <style>
        body {
            /* 設定漸層：從左上到右下 (to bottom right) */
            /* 顏色由 深藍綠色 (#004d4d) 轉向 亮綠色 (#66ffcc) */
            background: linear-gradient(135deg, #004d4d 0%, #008080 50%, #66ffcc 100%);
            
            /* 確保背景填滿整個螢幕 */
            height: 100vh;
            margin: 0;
            
            /* 文字排版 */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: "Microsoft JhengHei", sans-serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <h1>這是藍綠漸層背景</h1>
</body>
</html>
