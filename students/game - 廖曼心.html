<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smooth Flow Parkour</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #1a1a1a; border: 3px solid #333; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 20px; color: white; text-align: center; width: 100%; pointer-events: none; }
        .stat-box { display: inline-block; margin: 0 20px; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 5px; border-bottom: 2px solid #00ff88; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat-box">STAGE: <span id="lvl">1</span></div>
    <div class="stat-box">FAILURES: <span id="fails">0</span></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 900;
canvas.height = 500;

// Game Physics Tweaks
const GRAVITY = 0.4;
const FRICTION = 0.85;
const ACCEL = 0.6;
const MAX_SPEED = 5.5;
const JUMP_POWER = -9.5;

let currentLvl = 0;
let deathCount = 0;
let jumpBuffer = 0; // Remembers jump press
let coyoteTime = 0; // Allows jump after falling

const player = {
    x: 0, y: 0, w: 22, h: 22,
    vx: 0, vy: 0,
    grounded: false
};

const levels = [
    [ // Stage 1: The Warmup
        "                                ",
        "                                ",
        "        3                       ",
        "       111         11           ",
        "                11              ",
        "     11                         ",
        "  P        2222                 ",
        "11111111111111111111111111111111"
    ],
    [ // Stage 2: The Flow (Horizontal & Fair)
        "                                ",
        "                                ",
        "                   111      3   ",
        "               111     1111111  ",
        "          111                   ",
        "     111                        ",
        "  P                             ",
        "111  222222222222222222222222221"
    ],
    [ // Stage 3: The Leap
        "P                               ",
        "11                              ",
        "   11                           ",
        "      11                        ",
        "         11          11         ",
        "            11    11    11    3 ",
        "              11           1111 ",
        "22222222222222222222222222222222"
    ]
];

let mapData = [];

function loadLevel(n) {
    mapData = [];
    document.getElementById('lvl').innerText = n + 1;
    const layout = levels[n];
    for(let y=0; y<layout.length; y++) {
        for(let x=0; x<layout[y].length; x++) {
            let char = layout[y][x];
            let block = { x: x*40, y: y*50, w: 40, h: 50, type: char };
            if(char !== ' ') mapData.push(block);
            if(char === 'P') { player.x = block.x; player.y = block.y; player.vx = 0; player.vy = 0; }
        }
    }
}

const keys = {};
window.onkeydown = (e) => {
    keys[e.code] = true;
    if(e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') jumpBuffer = 6; 
};
window.onkeyup = (e) => keys[e.code] = false;

function update() {
    // Movement logic
    if (keys['ArrowLeft'] || keys['KeyA']) player.vx -= ACCEL;
    if (keys['ArrowRight'] || keys['KeyD']) player.vx += ACCEL;
    player.vx *= FRICTION;

    player.vy += GRAVITY;
    
    // Jump Logic (with Buffer and Coyote Time)
    if (jumpBuffer > 0) {
        if (player.grounded || coyoteTime > 0) {
            player.vy = JUMP_POWER;
            player.grounded = false;
            jumpBuffer = 0;
            coyoteTime = 0;
        }
        jumpBuffer--;
    }

    if (player.grounded) coyoteTime = 6;
    else coyoteTime--;

    // Collision (Split Axis)
    player.x += player.vx;
    handleCollisions('x');
    
    player.y += player.vy;
    player.grounded = false;
    handleCollisions('y');

    if (player.y > canvas.height) reset();
}

function handleCollisions(axis) {
    for (let b of mapData) {
        if (b.type === 'P') continue;
        
        if (player.x < b.x + b.w && player.x + player.w > b.x &&
            player.y < b.y + b.h && player.y + player.h > b.y) {
            
            if (b.type === '1') { // Solid
                if (axis === 'x') {
                    if (player.vx > 0) player.x = b.x - player.w;
                    else player.x = b.x + b.w;
                    player.vx = 0;
                } else {
                    if (player.vy > 0) {
                        player.y = b.y - player.h;
                        player.grounded = true;
                    } else {
                        player.y = b.y + b.h;
                    }
                    player.vy = 0;
                }
            } else if (b.type === '2') { // Lava
                reset();
            } else if (b.type === '3') { // Goal
                currentLvl = (currentLvl + 1) % levels.length;
                loadLevel(currentLvl);
            }
        }
    }
}

function reset() {
    deathCount++;
    document.getElementById('fails').innerText = deathCount;
    loadLevel(currentLvl);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw Level
    mapData.forEach(b => {
        if(b.type === '1') {
            ctx.fillStyle = '#333';
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.strokeStyle = '#444';
            ctx.strokeRect(b.x, b.y, b.w, b.h);
        } else if(b.type === '2') {
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(b.x, b.y + 30, b.w, 20); // Lava sits lower
        } else if(b.type === '3') {
            ctx.fillStyle = '#00ff88';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ff88';
            ctx.fillRect(b.x + 10, b.y, 20, b.h);
            ctx.shadowBlur = 0;
        }
    });

    // Draw Player
    ctx.fillStyle = '#00ccff';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00ccff';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;

    update();
    requestAnimationFrame(draw);
}

loadLevel(currentLvl);
draw();
</script>
</body>
</html>
