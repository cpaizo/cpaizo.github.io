<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈基米[漫]波 - 學生專屬小天地</title>
    <style>
        :root {
            --bg-color: #FDFBF7;
            --main-color: #F4EBE1;
            --accent-color: #D9C3B0;
            --text-color: #5A4B41;
            --button-color: #E6BAA3;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px 40px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(217, 195, 176, 0.3);
            border: 2px solid var(--main-color);
        }

        header h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            color: #4A3E3D;
        }

        header p {
            margin: 0;
            font-size: 1.1rem;
            color: #8C766B;
        }

        .shop-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            margin-bottom: 40px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            border: 2px solid #F0E6DF;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        /* 商品 Emoji 外圈，作為貓咪動畫的定位錨點 */
        .product-img-container {
            position: relative;
            width: 90px;
            height: 90px;
            margin-bottom: 15px;
        }

        .product-img {
            width: 100%;
            height: 100%;
            background: #F9F6F0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            user-select: none;
        }

        /* 隨機噴發貓咪的動態樣式 */
        .pop-cat {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 1.8rem;
            pointer-events: none;
            z-index: 10;
            animation: explode 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            user-select: none;
        }

        @keyframes explode {
            0% {
                transform: translate(-50%, -50%) scale(0.3) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(var(--rot));
                opacity: 0;
            }
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 1.1rem;
            color: #B58A63;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* 貓咪形狀按鈕 */
        .cat-btn {
            width: 75px;
            height: 65px;
            background-color: var(--button-color);
            position: relative;
            border: none;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        .cat-btn:active {
            transform: scale(0.95);
        }

        .cat-btn::before, .cat-btn::after {
            content: '';
            position: absolute;
            top: -8px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 18px solid var(--button-color);
        }
        .cat-btn::before { left: 6px; transform: rotate(-20deg); }
        .cat-btn::after { right: 6px; transform: rotate(20deg); }

        .cat-btn span {
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            display: block;
            margin-top: 8px;
            line-height: 1.2;
        }

        /* 購物車與結帳區域 */
        .cart-section {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            border: 2px solid var(--main-color);
            text-align: center;
            margin-bottom: 50px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #E0D5CB;
        }

        /* 取消商品按鈕 */
        .remove-btn {
            background-color: #E74C3C;
            color: white;
            border: none;
            padding: 4px 10px;
            font-size: 0.8rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-left: 10px;
        }
        .remove-btn:hover {
            background-color: #C0392B;
        }

        .total-price {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 20px 0;
            color: #4A3E3D;
        }

        .checkout-btn {
            background-color: #A9C2A6;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(169, 194, 166, 0.4);
            transition: all 0.2s;
        }

        .checkout-btn:hover {
            background-color: #93AB90;
            transform: scale(1.05);
        }

        /* 雨特效容器 */
        #effect-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .coin {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #FFD700;
            border-radius: 50%;
            border: 2px solid #DAA520;
            animation: fall linear forwards;
        }

        .packet {
            position: absolute;
            width: 20px;
            height: 32px;
            background-color: #E74C3C;
            border-radius: 3px;
            border: 1px solid #C0392B;
            animation: fall linear forwards;
        }
        .packet::after {
            content: '¥';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #F1C40F;
            font-size: 10px;
            font-weight: bold;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* 雲朵彈窗基本樣式 */
        .cloud-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(140, 125, 115, 0.4);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .cloud-box {
            background: #FFFFFF;
            position: relative;
            width: 320px;
            height: 200px;
            border-radius: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* 利用偽元素勾勒出雲朵澎澎的弧度 */
        .cloud-box::before {
            content: '';
            position: absolute;
            background: #FFFFFF;
            width: 140px; height: 140px;
            border-radius: 50%;
            top: -50px; left: 40px;
            z-index: -1;
        }

        .cloud-box::after {
            content: '';
            position: absolute;
            background: #FFFFFF;
            width: 110px; height: 110px;
            border-radius: 50%;
            top: -35px; right: 40px;
            z-index: -1;
        }

        .cloud-content h3 {
            margin: 0 0 10px 0;
            color: #5499C7;
            font-size: 1.4rem;
        }
        .cloud-content p {
            margin: 0 0 15px 0;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .cloud-close-btn {
            background: #A9C2A6;
            color: white;
            border: none;
            padding: 8px 22px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 抽籤彈窗樣式 */
        .draw-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .draw-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 350px;
            width: 100%;
        }

        .lucky-box {
            width: 120px;
            height: 180px;
            background: #E6BAA3;
            margin: 20px auto;
            border-radius: 15px 15px 5px 5px;
            position: relative;
            border: 4px solid #D9C3B0;
            box-shadow: inset 0 8px 0 #C8A28D;
        }
        .lucky-box::before {
            content: '哈基米籤筒';
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            writing-mode: vertical-lr;
            letter-spacing: 4px;
        }

        .stick {
            width: 12px;
            height: 60px;
            background: #F4EBE1;
            border: 2px solid #D9C3B0;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 3px 3px 0 0;
            display: none;
        }

        .shake-animation {
            animation: shakeBox 0.5s ease-in-out infinite;
        }

        @keyframes shakeBox {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }

        .draw-btn {
            background: #A9C2A6;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .draw-btn:disabled {
            background: #CCC;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <h1>哈基米[漫]波 🐾</h1>
        <p>學生專屬小天地 ✨ 漫畫、吧唧便宜賣！</p>
    </header>

    <div class="shop-container">
        <div class="product-card">
            <div class="product-img-container" id="img-container-0">
                <div class="product-img">📚</div>
            </div>
            <div class="product-title">1. 鬼滅之刃 漫畫</div>
            <div class="product-price">$100 元</div>
            <button class="cat-btn" onclick="addToCart('1. 鬼滅之刃 漫畫', 100, 0)"><span>加購物車<br>🐾</span></button>
        </div>
        <div class="product-card">
            <div class="product-img-container" id="img-container-1">
                <div class="product-img">📚</div>
            </div>
            <div class="product-title">2. 名偵探柯南 漫畫</div>
            <div class="product-price">$110 元</div>
            <button class="cat-btn" onclick="addToCart('2. 名偵探柯南 漫畫', 110, 1)"><span>加購物車<br>🐾</span></button>
        </div>
        <div class="product-card">
            <div class="product-img-container" id="img-container-2">
                <div class="product-img">📚</div>
            </div>
            <div class="product-title">3. 咒術迴戰 漫畫</div>
            <div class="product-price">$120 元</div>
            <button class="cat-btn" onclick="addToCart('3. 咒術迴戰 漫畫', 120, 2)"><span>加購物車<br>🐾</span></button>
        </div>
        <div class="product-card">
            <div class="product-img-container" id="img-container-3">
                <div class="product-img">🛍️</div>
            </div>
            <div class="product-title">4. 鬼滅之刃吧唧 盲袋</div>
            <div class="product-price">$150 元 / 套</div>
            <button class="cat-btn" onclick="addToCart('4. 鬼滅之刃吧唧 盲袋', 150, 3)"><span>加購物車<br>🐾</span></button>
        </div>
        <div class="product-card">
            <div class="product-img-container" id="img-container-4">
                <div class="product-img">🛍️</div>
            </div>
            <div class="product-title">5. 咒術迴戰吧唧 盲袋</div>
            <div class="product-price">$150 元 / 套</div>
            <button class="cat-btn" onclick="addToCart('5. 咒術迴戰吧唧 盲袋', 150, 4)"><span>加購物車<br>🐾</span></button>
        </div>
    </div>

    <div class="cart-section">
        <h3>🛒 我的購物車</h3>
        <div id="cart-items-list">
            <p style="color: #A09085;">購物車空空如也 🐾</p>
        </div>
        <div class="total-price">總金額: $<span id="total-amount">0</span> 元</div>
        <button class="checkout-btn" onclick="checkout()">確認結帳 🐾</button>
    </div>

    <div id="effect-container"></div>

    <div class="cloud-overlay" id="cloudOverlay">
        <div class="cloud-box">
            <div class="cloud-content">
                <h3>☁️ 滿額好康！</h3>
                <p id="cloudMessage">恭喜獲得折扣！</p>
                <button class="cloud-close-btn" onclick="closeCloudModal()">太棒了🐾</button>
            </div>
        </div>
    </div>

    <div class="draw-overlay" id="drawOverlay">
        <div class="draw-container">
            <h3>🎉 滿500元幸運抽籤活動 🎉</h3>
            <p style="color:#8C766B; font-size:0.9rem;">誠心搖晃籤筒，抽取專屬折扣！</p>
            <div class="lucky-box" id="luckyBox">
                <div class="stick" id="luckyStick"></div>
            </div>
            <button class="draw-btn" id="drawBtn" onclick="startDraw()">搖筒抽籤！</button>
        </div>
    </div>

    <script>
        let cart = [];
        let total = 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 豐富多樣的可愛貓咪表情包庫
        const catEmojis = ['🐱', '😸', '😹', '😻', '😽', '🐾', '🐈', '🦁', '🐯', '😺', '😾', '😼'];

        // 用於生成各種乾淨清脆、輕快的「可愛八音盒提示音」
        function playCuteChime(type) {
            const now = audioCtx.currentTime;
            if (type === 'add') {
                // 輕快向上的雙音節
                createTone(523.25, 0.08, now); // C5
                createTone(659.25, 0.12, now + 0.06); // E5
            } else if (type === 'remove') {
                // 輕柔向下的和弦
                createTone(587.33, 0.1, now); // D5
                createTone(440.00, 0.15, now + 0.05); // A4
            } else if (type === 'checkout') {
                // 三連音過關慶祝聲
                createTone(523.25, 0.08, now); // C5
                createTone(659.25, 0.08, now + 0.08); // E5
                createTone(783.99, 0.2, now + 0.16); // G5
            }
        }

        function createTone(freq, duration, startTime) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine'; // 正弦波最清脆、有水晶音樂的感覺
            osc.frequency.setValueAtTime(freq, startTime);
            
            gain.gain.setValueAtTime(0.2, startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        // 觸發隨機貓咪噴發動畫
        function triggerCatAnimation(containerId) {
            const container = document.getElementById(`img-container-${containerId}`);
            
            // 每次隨機發射 5 到 7 隻貓咪
            const count = Math.floor(Math.random() * 3) + 5; 
            
            for(let i = 0; i < count; i++) {
                const catSpan = document.createElement('span');
                catSpan.classList.add('pop-cat');
                
                // 每次都隨機挑選不同的貓咪 Emoji
                const randomEmoji = catEmojis[Math.floor(Math.random() * catEmojis.length)];
                catSpan.innerText = randomEmoji;

                // 隨機計算發射方向（半徑 70px 到 130px 之間射出）
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.floor(Math.random() * 60) + 70;
                const tx = Math.cos(angle) * distance + 'px';
                const ty = Math.sin(angle) * distance + 'px';
                
                // 隨機轉動的角度
                const rot = (Math.random() * 360 - 180) + 'deg';

                // 注入變數給 CSS 動畫讀取
                catSpan.style.setProperty('--tx', tx);
                catSpan.style.setProperty('--ty', ty);
                catSpan.style.setProperty('--rot', rot);

                container.appendChild(catSpan);

                // 動畫完畢後自動銷毀
                setTimeout(() => {
                    catSpan.remove();
                }, 800);
            }
        }

        // 購物車功能
        function addToCart(name, price, containerId) {
            playCuteChime('add'); // 播放可愛加入提示音
            triggerCatAnimation(containerId); // 觸發每次都不同的貓咪動畫
            
            cart.push({ id: Date.now() + Math.random(), name, price });
            updateCart();
        }

        // 移除單一商品項目
        function removeFromCart(itemId) {
            playCuteChime('remove'); // 播放取消提示音
            cart = cart.filter(item => item.id !== itemId);
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-items-list');
            const totalSpan = document.getElementById('total-amount');
            
            if(cart.length === 0) {
                list.innerHTML = `<p style="color: #A09085;">購物車空空如也 🐾</p>`;
                total = 0;
                totalSpan.innerText = total;
                return;
            }

            list.innerHTML = '';
            total = 0;
            cart.forEach((item) => {
                total += item.price;
                list.innerHTML += `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <div>
                            <span style="font-weight:bold; color:#B58A63;">$${item.price} 元</span>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">❌ 取消</button>
                        </div>
                    </div>
                `;
            });
            totalSpan.innerText = total;
        }

        // 結帳邏輯
        function checkout() {
            if (cart.length === 0) {
                alert("購物車裡面還沒有東西喔！🐾");
                return;
            }

            playCuteChime('checkout'); // 播放確認結帳大提示音

            if (total >= 500) {
                alert(`您的消費金額為 $${total} 元，已滿500元！即將進入幸運抽籤活動！ 🐾`);
                openDrawModal();
            } 
            else if (total >= 300) {
                let finalPrice = Math.round(total * 0.95);
                showCloudModal(`🎉 觸發滿300元福利！<br>享有 95 折優惠！<br>折抵後金額為：$${finalPrice} 元！`);
                startRain('coin'); // 金幣雨
                resetCart();       
            } 
            else {
                alert(`結帳成功！總共是 $${total} 元，謝謝光臨哈基米[漫]波！🐾`);
                resetCart();       
            }
        }

        function resetCart() {
            cart = [];
            updateCart();
        }

        // 雲朵提示窗控制
        function showCloudModal(msg) {
            document.getElementById('cloudMessage').innerHTML = msg;
            document.getElementById('cloudOverlay').style.display = 'flex';
        }

        function closeCloudModal() {
            document.getElementById('cloudOverlay').style.display = 'none';
        }

        // 落下雨特效 (固定6秒)
        function startRain(type) {
            const container = document.getElementById('effect-container');
            const endTime = Date.now() + 6000;

            const interval = setInterval(() => {
                if (Date.now() > endTime) {
                    clearInterval(interval);
                    return;
                }
                const element = document.createElement('div');
                element.classList.add(type); 
                element.style.left = Math.random() * 100 + 'vw';
                element.style.animationDuration = (Math.random() * 2 + 1) + 's';
                container.appendChild(element);

                setTimeout(() => element.remove(), 3000);
            }, 80);
        }

        // --- 抽籤活動設定 ---
        const prizes = ["打七折", "打五折", "打八五折", "打三折", "打九折", "原價付", "免費"];
        
        function openDrawModal() {
            document.getElementById('drawOverlay').style.display = 'flex';
            document.getElementById('luckyStick').style.display = 'none';
            document.getElementById('drawBtn').disabled = false;
        }

        function startDraw() {
            const drawBtn = document.getElementById('drawBtn');
            const luckyBox = document.getElementById('luckyBox');
            const luckyStick = document.getElementById('luckyStick');
            
            drawBtn.disabled = true;
            luckyBox.classList.add('shake-animation');
            
            setTimeout(() => {
                luckyBox.classList.remove('shake-animation');
                luckyStick.style.display = 'block';
                
                const prizeIndex = Math.floor(Math.random() * prizes.length);
                const finalPrize = prizes[prizeIndex];

                setTimeout(() => {
                    // 將轉盤中獎也改用可愛雲朵形狀顯示
                    document.getElementById('drawOverlay').style.display = 'none';
                    showCloudModal(`恭喜你抽到<br><span style="color:#E74C3C; font-size:1.3rem;">${finalPrize}</span>！🐾`);
                    
                    startRain('packet'); // 紅包雨
                    resetCart();         
                }, 600);
