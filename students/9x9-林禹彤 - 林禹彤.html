<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>九九乘法表 - 圓角設計</title>
    <style>
        /* 設定表格整體樣式 */
        table {
            border-collapse: separate; /* 重要：設定為 separate 才能顯示圓角 */
            border-spacing: 0;        /* 移除單元格間距 */
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            border: 2px solid #4CAF50; /* 邊框顏色 */
            border-radius: 15px;      /* 這裡控制整體的圓角 */
            overflow: hidden;         /* 確保內容不會超出圓角邊界 */
            font-family: Arial, sans-serif;
            text-align: center;
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 10px;
        }

        /* 設定標題列顏色 */
        th {
            background-color: #4CAF50;
            color: white;
        }

        /* 滑鼠經過時的變色效果 (選配) */
        tr:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">九九乘法表</h2>

<table>
    <thead>
        <tr>
            <th>×</th>
            <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th>
        </tr>
    </thead>
    <tbody>
        <script>
            for (let i = 1; i <= 9; i++) {
                document.write("<tr>");
                document.write("<th>" + i + "</th>"); // 左側標題列
                for (let j = 1; j <= 9; j++) {
                    document.write("<td>" + i + " × " + j + " = " + (i * j) + "</td>");
                }
                document.write("</tr>");
            }
        </script>
    </tbody>
</table>

</body>
</html>
