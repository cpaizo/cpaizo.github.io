<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>學生精彩作品集</title>
    <style>
        .portfolio-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 450px;
            margin: 40px auto;
            font-family: 'Comic Sans MS', 'Microsoft JhengHei', sans-serif;
            padding: 20px;
            background: #FFFDE7; /* 溫馨的淡黃色底塊 */
            border: 3px dashed #FBC02D;
            border-radius: 20px;
        }

        .portfolio-title {
            text-align: center;
            color: #F57F17;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.4rem;
        }

        .student-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            font-size: 1.15rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 12px;
            box-shadow: 0 6px 0 var(--shadow-color);
            transition: transform 0.1s, background-color 0.2s;
            color: white;
            cursor: pointer;
        }

        /* 懸停與點擊的動態特效 */
        .student-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }
        .student-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--shadow-color);
        }

        /* 個別學生作品的粉嫩與亮眼色調 */
        .btn-bomb {
            background-color: #AB47BC; /* 質感紫 */
            --shadow-color: #7B1FA2;
        }
        .btn-macaron {
            background-color: #FF7043; /* 馬卡龍橘紅 */
            --shadow-color: #D84315;
        }
        .btn-penguin {
            background-color: #29B6F6; /* 企鵝冰雪藍 */
            --shadow-color: #0288D1;
        }

        .btn-tag {
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.25);
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <div class="portfolio-container">
        <h3 class="portfolio-title">✨ 學生創客網頁作品展 ✨</h3>
        
        <a href="https://cpaizo.github.io/students/%E6%8B%86%E5%BD%88%E6%8C%91%E6%88%B0_%E5%BC%B5%E8%8A%AF%E5%AB%99.html" target="_blank" class="student-btn btn-bomb">
            <span>💣 拆彈挑戰 <span class="btn-tag">張芯婗 作品</span></span>
            <span>➔</span>
        </a>

        <a href="https://cpaizo.github.io/students/%E9%A6%AC%E5%8D%A1%E9%BE%8D%E9%81%8A%E6%88%B2%E6%A8%82%E5%9C%92_%E5%BC%B5%E5%80%A2%E9%88%9E.html" target="_blank" class="student-btn btn-macaron">
            <span> Vignette 🎡 馬卡龍遊戲樂園 <span class="btn-tag">張億鈺 作品</span></span>
            <span>➔</span>
        </a>

        <a href="https://cpaizo.github.io/students/%E4%BC%81%E9%B5%9D%E6%95%B8%E5%AD%B8_%E9%99%B3%E7%8E%89%E5%A9%B7.html" target="_blank" class="student-btn btn-penguin">
            <span>🐧 企鵝數學大冒險 <span class="btn-tag">陳玉婷 作品</span></span>
            <span>➔</span>
        </a>

    </div>

</body>
</html>
