<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名偵探柯南：帝丹高階拆彈系統</title>
    <style>
        :root {
            --primary: #ff3b30;
            --success: #34c759;
            --warning: #ffcc00;
            --bg-dark: #0d0e12;
            --panel-bg: #1c1d24;
            --glow-cyan: #00f0ff;
        }

        body {
            background: radial-gradient(circle, #1a1c23 0%, var(--bg-dark) 100%);
            color: #fff;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .game-container {
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(255, 59, 48, 0.15);
            text-align: center;
            max-width: 480px;
            width: 100%;
            border: 2px solid #2a2d38;
            position: relative;
        }

        /* 系統初始化區塊：改成大橫條，不擋住全螢幕 */
        .system-init-box {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glow-cyan);
            padding: 15px;
            border-radius: 14px;
            margin-bottom: 20px;
        }

        .start-system-btn {
            background: linear-gradient(135deg, #00f0ff, #0072ff);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            transition: 0.2s;
            width: 100%;
        }
        .start-system-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid #2a2d38;
        }

        .toggle-btn {
            background: #2c2c35;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 15px 0;
            background: linear-gradient(90deg, #ff3b30, #ff9500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress-container {
            width: 100%;
            background: #111216;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #2a2d38;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #34c759, #00f0ff);
            transition: width 0.4s ease;
        }

        .timer-box {
            font-size: 36px;
            font-family: monospace;
            font-weight: bold;
            color: var(--warning);
            background-color: #050507;
            padding: 12px 25px;
            border-radius: 14px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 204, 0, 0.3);
        }

        .question-box {
            background: linear-gradient(145deg, #22242c, #17181e);
            padding: 20px;
            font-size: 24px;
            font-weight: 700;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #3a3f50;
        }

        .display-screen {
            background-color: #090a0d;
            color: var(--glow-cyan);
            font-size: 32px;
            font-weight: bold;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            min-height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .btn {
            background: linear-gradient(135deg, #3a3f50, #2c2f3c);
            color: #e5e5ea;
            border: 1px solid #4a5066;
            padding: 18px;
            font-size: 22px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
        }
        .btn:hover {
            border-color: #00f0ff;
        }
        .btn-clear { background: linear-gradient(135deg, #ff9500, #cc7600); border-color: #ffb347; }
        .btn-submit { background: linear-gradient(135deg, var(--success), #248a3d); grid-column: span 2; border-color: #54d675; }

        .firework-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 14, 18, 0.9);
            border-radius: 22px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
            border: 2px solid var(--primary);
        }

        #conan-player {
            width: 0; height: 0; position: absolute; visibility: hidden;
        }
    </style>
</head>
<body>

    <iframe 
        id="conan-player" 
        src="https://www.youtube.com/embed/1XWe2MBaLRI?enablejsapi=1&controls=0" 
        allow="autoplay; encrypted-media">
    </iframe>

    <div class="game-container">
        
        <div class="firework-overlay" id="fireworkOverlay">
            <h2 style="color: var(--primary);">🎆 系統引爆 🎆</h2>
            <p>時間到了！推理失敗！</p>
            <button class="toggle-btn" style="background: var(--primary);" onclick="resetFullGame()">重啟系統</button>
        </div>

        <div class="top-bar">
            <div id="stageText" style="font-weight: bold; color: var(--glow-cyan);">關卡: 1 / 3</div>
            <div>
                <button class="toggle-btn" id="musicBtn" onclick="toggleMusic()">⏸ 暫停音樂</button>
            </div>
        </div>

        <h1>名偵探柯南：拆彈挑戰</h1>

        <div class="system-init-box" id="initBox">
            <button class="start-system-btn" onclick="initSystem()">⚡ 點擊此處：啟動音樂與遊戲</button>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="timer-box" id="timerDisplay">⏱️ 20.00s</div>
        
        <div class="question-box" id="questionText">請先點擊上方藍色按鈕啟動</div>
        
        <div class="display-screen" id="answerDisplay"></div>

        <div class="keyboard">
            <button class="btn" onclick="pressNum(1)">1</button>
            <button class="btn" onclick="pressNum(2)">2</button>
            <button class="btn" onclick="pressNum(3)">3</button>
            <button class="btn" onclick="pressNum(4)">4</button>
            <button class="btn" onclick="pressNum(5)">5</button>
            <button class="btn" onclick="pressNum(6)">6</button>
            <button class="btn" onclick="pressNum(7)">7</button>
            <button class="btn" onclick="pressNum(8)">8</button>
            <button class="btn" onclick="pressNum(9)">9</button>
            <button class="btn" onclick="pressNum(0)">0</button>
            <button class="btn btn-clear" onclick="clearNum()">清除</button>
            <button class="btn btn-submit" onclick="submitAnswer()">解密確認</button>
        </div>
    </div>

<script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    let isPlaying = false;
    let gameStarted = false;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('conan-player');
    }

    function initSystem() {
        document.getElementById('initBox').style.display = "none";
        playMusic();
        gameStarted = true;
        startGame();
    }

    function playMusic() {
        if (player && player.playVideo) {
            player.playVideo();
            isPlaying = true;
            document.getElementById('musicBtn').innerText = "⏸ 暫停音樂";
        }
    }

    function pauseMusic() {
        if (player && player.pauseVideo) {
            player.pauseVideo();
            isPlaying = false;
            document.getElementById('musicBtn').innerText = "▶ 播放音樂";
        }
    }

    function toggleMusic() {
        if (isPlaying) pauseMusic(); else playMusic();
    }

    const itemBank = [
        { q: "3, 6, 9, 12, 15, [ ? ]", a: 18, tip: "每次都加 3" },
        { q: "20, 18, 16, 14, 12, [ ? ]", a: 10, tip: "每次都減 2" },
        { q: "5, 10, 15, 20, 25, [ ? ]", a: 30, tip: "每次都加 5" },
        { q: "1, 2, 4, 8, 16, [ ? ]", a: 32, tip: "後面的數字是前面的 2 倍" }
    ];

    let currentQuestion = {};
    let countdown;
    let timeLeft = 20.00;
    let isGameOver = false;
    let score = 0; 
    const targetScore = 3;

    function startGame() {
        if (!gameStarted) return;
        if (score >= targetScore) {
            alert("👑 真相只有一個！你成功阻止了爆炸！");
            resetFullGame();
            return;
        }

        isGameOver = false;
        timeLeft = 20.00;
        document.getElementById('answerDisplay').innerText = "";
        document.getElementById('fireworkOverlay').style.display = "none";
        document.getElementById('stageText').innerText = `關卡: ${score + 1} / ${targetScore}`;
        document.getElementById('progressBar').style.width = `${(score / targetScore) * 100}%`;

        const randomIndex = Math.floor(Math.random() * itemBank.length);
        currentQuestion = itemBank[randomIndex];
        document.getElementById('questionText').innerText = currentQuestion.q;

        if (isPlaying) playMusic();

        clearInterval(countdown);
        countdown = setInterval(() => {
            timeLeft -= 0.01;
            if (timeLeft <= 0) {
                timeLeft = 0;
                clearInterval(countdown);
                triggerFirework();
            }
            document.getElementById('timerDisplay').innerText = `⏱️ ${timeLeft.toFixed(2)}s`;
        }, 10);
    }

    function pressNum(num) {
        if (isGameOver || !gameStarted) return;
        const display = document.getElementById('answerDisplay');
        if (display.innerText.length < 4) display.innerText += num;
    }

    function clearNum() {
        document.getElementById('answerDisplay').innerText = "";
    }

    function submitAnswer() {
        if (isGameOver || !gameStarted) return;
        const userAns = document.getElementById('answerDisplay').innerText;

        if (userAns === "") return;

        if (parseInt(userAns) === currentQuestion.a) {
            clearInterval(countdown);
            isGameOver = true;
            score++;
            alert(`⚡ 密碼正確！成功解開第 ${score} 階段！\n【提示】${currentQuestion.tip}`);
            startGame(); 
        } else {
            alert("❌ 密碼錯誤！時間懲罰扣 4 秒！");
            clearNum();
            timeLeft = Math.max(0.1, timeLeft - 4);
        }
    }

    function triggerFirework() {
        isGameOver = true;
        pauseMusic();
        document.getElementById('fireworkOverlay').style.display = "flex";
    }

    function resetFullGame() {
        score = 0;
        playMusic();
        startGame();
    }
</script>
</body>
</html>
