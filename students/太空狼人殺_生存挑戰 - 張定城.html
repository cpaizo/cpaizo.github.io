<body>

    <canvas id="gameCanvas" width="1182" height="726"></canvas>

    <div class="ui-layer">
        <div class="p-6 w-full flex justify-between items-start bg-gradient-to-b from-black/90 to-transparent">
            <div class="flex flex-col gap-1">
                <div class="text-sky-400 font-bold text-lg tracking-wider drop-shadow-md" id="hud-title">任務/時間</div>
                <div class="w-48 sm:w-64 h-5 sm:h-6 bg-slate-800 rounded-full border border-slate-600 overflow-hidden relative shadow-lg">
                    <div id="total-progress" class="h-full bg-gradient-to-r from-green-600 to-green-400 w-0 transition-all duration-300"></div>
                </div>
                <div class="text-xs text-gray-400 mt-1 flex gap-4">
                    <span id="hud-text">已完成 <span id="task-count">0</span> / <span id="max-task-count">0</span></span>
                </div>
            </div>
            
            <div id="alert-text" class="hidden bg-red-900/90 border border-red-500 text-red-100 px-4 py-2 rounded animate-danger font-bold tracking-widest shadow-[0_0_15px_rgba(239,68,68,0.5)]">
                ⚠ 掃描：發現威脅
            </div>

            <div class="flex gap-3 absolute top-6 right-6">
                <button id="map-btn" title="地圖 (M/Tab)" class="p-2 bg-slate-800/80 border border-slate-600 rounded-full hover:bg-slate-700 active:scale-95 transition-all z-50 pointer-events-auto backdrop-blur-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-white">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c-.317.159-.69.159-1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z"></path>
                    </svg>
                </button>
                <button id="pause-btn" title="暫停 (P/Esc)" class="p-2 bg-slate-800/80 border border-slate-600 rounded-full hover:bg-slate-700 active:scale-95 transition-all z-50 pointer-events-auto backdrop-blur-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-white">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5"></path>
                    </svg>
                </button>
            </div>

<script>
// Game Globals
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });

const TILE_SIZE = 50;
const MAP_COLS = 50; 
const MAP_ROWS = 50;
const WORLD_WIDTH = MAP_COLS * TILE_SIZE;
const WORLD_HEIGHT = MAP_ROWS * TILE_SIZE;
const TOTAL_TASKS = 10;
const NPC_COUNT = 15;

const COLORS = {

    GRID: '#1a1a1a',
    PLAYER_BODY: '#0ea5e9', 
    PLAYER_DISGUISED: '#94a3b8', 
    PLAYER_PHASE: '#6366f1',

    IMPOSTOR_STUNNED: '#555555',

    IMPOSTOR_RED: '#ef4444',

let gameState = 'MENU'; 
let isPaused = false;
let isMapOpen = false;
let lastTime = 0;
let camera = { x: 0, y: 0 };
let stars = [];

let activeSkills = new Set();

let player = { 
    x: 0, y: 0, radius: 18, speed: 5.0, dead: false, facingRight: true,
    scan: { state: 'READY', timer: 0, duration: 300, maxCooldown: 600 },
    disguise: { state: 'READY', timer: 0, duration: 300, maxCooldown: 1200 },
    sprint: { state: 'READY', stamina: 300, maxStamina: 300, speedBuff: 10.0, fatigue: 0 },
    eagle: { state: 'READY', timer: 0, duration: 180, maxCooldown: 1200 },
    alert: { state: 'READY', timer: 0, duration: 300, maxCooldown: 1200 }, 
    wallwalk: { state: 'READY', timer: 0, duration: 600, maxCooldown: 1800 },
    avenger: { state: 'READY', timer: 0, duration: 1200, maxCooldown: 3000 },
    teleporter: { state: 'READY', timer: 0, maxCooldown: 600 },
    repel: { state: 'READY', timer: 0, maxCooldown: 1800 },

    spirit: { state: 'READY', timer: 0, duration: 600, bodyX: 0, bodyY: 0 }, 
    gamble: { state: 'READY', charges: 3, maxCooldown: 60 }, 
    trapper: { state: 'READY', timer: 0, maxCooldown: 1200 }, 
    walkAnim: 0,
    isInTeleport: false,
    teleportTimer: 0,
    currentPadIndex: -1,
    publicTeleportsLeft: 5,
    color: COLORS.PLAYER_BODY, 
    lastX: 0, 
    lastY: 0,
    subClass: null, 
    hasRevived: false 
};

let activeTaskType = null; 
let exploredCells = new Set(); 
let gameHistory = []; 
const HISTORY_DURATION = 600; 

let miniGame = {
    cursorPos: 0,
    direction: 1,
    speed: 1.5,
    targetStart: 40,
    targetWidth: 20,
    stage: 0,
    active: false
};

let wireGame = {
    colors: ['red', 'blue', 'yellow', 'pink'],
    leftOrder: [],
    rightOrder: [],
    connections: [],
    dragging: null,
    currentMouse: { x: 0, y: 0 },
    completedCount: 0
};

let impostors = [];
let npcs = []; 

const wallMap = new Uint8Array(MAP_COLS * MAP_ROWS);
let tasks = []; 
let nearestTask = null;
let completedCount = 0;
let currentTask = null;

const keys = {};
let joystick = { active: false, tx: 0, ty: 0, dx: 0, dy: 0 };
let isActionPressed = false;
let skillInput = {}; 
let skillLocks = {};

// --- Helper Functions ---
function addWall(c, r) { 
    if (c >= 0 && c < MAP_COLS && r >= 0 && r < MAP_ROWS) {
        wallMap[c + r * MAP_COLS] = 1;
    }
}
function removeWall(c, r) {
    if (c >= 0 && c < MAP_COLS && r >= 0 && r < MAP_ROWS) {
        wallMap[c + r * MAP_COLS] = 0;
    }
}
function isWall(c, r) { 
    if (c < 0 || c >= MAP_COLS || r < 0 || r >= MAP_ROWS) return true; 
    return wallMap[c + r * MAP_COLS] === 1;
}

function checkCollision(x, y) {
    if (x < 0 || x > WORLD_WIDTH || y < 0 || y > WORLD_HEIGHT) return true;
    const margin = 12;
    const points = [{x:x-margin, y:y-margin}, {x:x+margin, y:y-margin}, {x:x-margin, y:y+margin}, {x:x+margin, y:y+margin}];
    for(let p of points) {
        if (isWall(Math.floor(p.x/TILE_SIZE), Math.floor(p.y/TILE_SIZE))) return true;
    }
    return false;
}

function moveEntity(ent, dx, dy, ignoreCollision = false) {
    if(ignoreCollision) {
        if(ent.x + dx > 0 && ent.x + dx < WORLD_WIDTH) ent.x += dx;
        if(ent.y + dy > 0 && ent.y + dy < WORLD_HEIGHT) ent.y += dy;
        return;
    }
    if(!checkCollision(ent.x + dx, ent.y)) ent.x += dx;
    if(!checkCollision(ent.x, ent.y + dy)) ent.y += dy;
}

function checkWallStuck() {
    const c = Math.floor(player.x / TILE_SIZE);
    const r = Math.floor(player.y / TILE_SIZE);
    if(isWall(c, r)) {
        let found = false;
        let dist = 1;
        while(!found && dist < 20) {
            for(let rOff = -dist; rOff <= dist; rOff++) {
                for(let cOff = -dist; cOff <= dist; cOff++) {
                    if(Math.abs(rOff) === dist || Math.abs(cOff) === dist) {
                        if(!isWall(c + cOff, r + rOff) && c+cOff > 0 && c+cOff < MAP_COLS && r+rOff > 0 && r+rOff < MAP_ROWS) {
                            player.x = (c + cOff) * TILE_SIZE + TILE_SIZE/2;
                            player.y = (r + rOff) * TILE_SIZE + TILE_SIZE/2;
                            found = true;
                            showNotification("⚠ 已傳送至安全區域");
                            break;
                        }
                    }
                }
                if(found) break;
            }
            dist++;
        }
    }
}

function getRandomPoint() {
    let spot = {x:0, y:0};
    let found = false;
    let tries = 0;
    while(!found && tries < 500) {
        const tx = Math.random() * (WORLD_WIDTH - 100) + 50;
        const ty = Math.random() * (WORLD_HEIGHT - 100) + 50;
        if(!isWall(Math.floor(tx/TILE_SIZE), Math.floor(ty/TILE_SIZE))) {
            spot.x = tx;
            spot.y = ty;
            found = true;
        }
        tries++;
    }
    // Fallback if random fails (rare in this map)
    if(!found) { spot.x = 25*TILE_SIZE; spot.y = 25*TILE_SIZE; }
    return spot;
}

function getPointNearPlayer() {
    let tries = 0;
    while(tries < 20) {
        const ang = Math.random() * Math.PI * 2;
        const rad = Math.random() * 600;
        const tx = player.x + Math.cos(ang) * rad;
        const ty = player.y + Math.sin(ang) * rad;
        if(tx > 0 && tx < WORLD_WIDTH && ty > 0 && ty < WORLD_HEIGHT) {
             if(!isWall(Math.floor(tx/TILE_SIZE), Math.floor(ty/TILE_SIZE))) return {x: tx, y: ty};
        }
        tries++;
    }
    return getRandomPoint(); 
}

function bfsNextMove(startX, startY, targetX, targetY) {
    const startC = Math.floor(startX / TILE_SIZE);
    const startR = Math.floor(startY / TILE_SIZE);
    const targetC = Math.floor(targetX / TILE_SIZE);
    const targetR = Math.floor(targetY / TILE_SIZE);

    if (startC === targetC && startR === targetR) return { x: targetX, y: targetY };

    let queue = [{ c: startC, r: startR, path: [] }];
    let visited = new Set();
    visited.add(`${startC},${startR}`);
    
    let iterations = 0;
    
    while (queue.length > 0 && iterations < 500) {
        let curr = queue.shift();
        iterations++;
        
        if (curr.c === targetC && curr.r === targetR) {
            if (curr.path.length > 0) {
                return { x: curr.path[0].c * TILE_SIZE + TILE_SIZE/2, y: curr.path[0].r * TILE_SIZE + TILE_SIZE/2 };
            }
            return { x: targetX, y: targetY };
        }

        const dirs = [[0,1], [0,-1], [1,0], [-1,0]];
        for(let d of dirs) {
            let nc = curr.c + d[0];
            let nr = curr.r + d[1];
            if(nc >= 0 && nc < MAP_COLS && nr >= 0 && nr < MAP_ROWS) {
                if(!visited.has(`${nc},${nr}`) && !isWall(nc, nr)) {
                    visited.add(`${nc},${nr}`);
                    let newPath = [...curr.path];
                    if (newPath.length === 0) newPath.push({c: nc, r: nr}); 
                    queue.push({c: nc, r: nr, path: newPath});
                }
            }
        }
    }
    return { x: targetX, y: targetY };
}

function generateMap() {
    wallMap.fill(0);
    
    if (mapType === 'FIXED') {
        for(let c=0; c<MAP_COLS; c++) {
            for(let r=0; r<MAP_ROWS; r++) {
                addWall(c, r);
            }
        }
        const carve = (c, r, w, h) => {
            for(let x=c; x<c+w; x++) {
                for(let y=r; y<r+h; y++) {
                    removeWall(x, y); 
                }
            }
        };

        carve(22, 4, 6, 42);  
        carve(4, 22, 42, 6);  
        carve(20, 20, 10, 10); 
        carve(8, 8, 34, 3);   
        carve(8, 39, 34, 3);  
        carve(8, 8, 3, 34);   
        carve(39, 8, 3, 34);  
        carve(3, 3, 4, 4);    
        carve(13, 13, 6, 6);  
        carve(43, 3, 4, 4);   
        carve(31, 13, 6, 6);  
        carve(3, 43, 4, 4);   
        carve(13, 31, 6, 6);  
        carve(43, 43, 4, 4);  
        carve(31, 31, 6, 6);  
        carve(8, 15, 14, 2);  
        carve(28, 15, 14, 2); 
        carve(8, 33, 14, 2);  
        carve(28, 33, 14, 2); 
        carve(15, 8, 2, 14);  
        carve(33, 8, 2, 14);  
        carve(15, 28, 2, 14); 
        carve(33, 28, 2, 14); 
        carve(6, 6, 3, 3);    
        carve(41, 6, 3, 3);   
        carve(6, 41, 3, 3);   
        carve(41, 41, 3, 3);  
        carve(18, 24, 2, 2);  
        carve(30, 24, 2, 2);  
        carve(24, 18, 2, 2);  
        carve(24, 30, 2, 2);  
        
        // Ensure center is clear for spawn
        removeWall(25, 25);
        removeWall(24, 25);
        
        addWall(22, 22); addWall(27, 22); 
        addWall(22, 27); addWall(27, 27);
        
        addWall(15, 15); addWall(35, 15);
        addWall(15, 35); addWall(35, 35);

    } else {
        for(let c=0; c<MAP_COLS; c++) { addWall(c, 0); addWall(c, MAP_ROWS-1); }
        for(let r=0; r<MAP_ROWS; r++) { addWall(0, r); addWall(MAP_COLS-1, r); }
        for(let r=2; r<MAP_ROWS-2; r+=2) {
            for(let c=2; c<MAP_COLS-2; c+=2) {
                if(Math.random() > 0.65) {
                    addWall(c, r); addWall(c+1, r); addWall(c, r+1); addWall(c+1, r+1);
                }
                if(Math.random() > 0.8) { addWall(c+2, r); addWall(c+2, r+1); }
            }
        }
    }
    
    // Always carve out corners for public telepads and set their coordinates
    const padSize = 3;
    const offset = 1;
    for (let r=offset; r<offset+padSize; r++) {
        for (let c=offset; c<offset+padSize; c++) {
            removeWall(c, r);
            removeWall(MAP_COLS - 1 - c, r);
            removeWall(c, MAP_ROWS - 1 - r);
            removeWall(MAP_COLS - 1 - c, MAP_ROWS - 1 - r);
        }
    }
    
    publicTelepads = [
        {x: (offset + padSize/2) * TILE_SIZE, y: (offset + padSize/2) * TILE_SIZE},
        {x: (MAP_COLS - 1 - offset - padSize/2 + 0.5) * TILE_SIZE, y: (offset + padSize/2) * TILE_SIZE},
        {x: (offset + padSize/2) * TILE_SIZE, y: (MAP_ROWS - 1 - offset - padSize/2 + 0.5) * TILE_SIZE},
        {x: (MAP_COLS - 1 - offset - padSize/2 + 0.5) * TILE_SIZE, y: (MAP_ROWS - 1 - offset - padSize/2 + 0.5) * TILE_SIZE}
    ];
}

function getConnectedRegion(startC, startR) {
    let visited = new Set();
    let queue = [{c: startC, r: startR}];
    let result = [];
    let startKey = `${startC},${startR}`;
    visited.add(startKey);
    result.push({c: startC, r: startR});
    let head = 0;
    while(head < queue.length) {
        let curr = queue[head++];
        const dirs = [[0,1], [0,-1], [1,0], [-1,0]];
        for(let d of dirs) {
            let nc = curr.c + d[0];
            let nr = curr.r + d[1];
            if(nc >= 0 && nc < MAP_COLS && nr >= 0 && nr < MAP_ROWS) {
                let key = `${nc},${nr}`;
                if(!visited.has(key) && !isWall(nc, nr)) {
                    visited.add(key);
                    queue.push({c: nc, r: nr});
                    result.push({c: nc, r: nr});
                }
            }
        }
    }
    return result;
}

function spawnEntities() {
    let validCoords = [];
    if (mapType === 'FIXED') {
        validCoords = getConnectedRegion(25, 25);
    } else {
        let attempts = 0;
        while(validCoords.length < 500 && attempts < 100) {
            let seedC = Math.floor(Math.random() * (MAP_COLS-2)) + 1;
            let seedR = Math.floor(Math.random() * (MAP_ROWS-2)) + 1;
            if(!isWall(seedC, seedR)) validCoords = getConnectedRegion(seedC, seedR);
            attempts++;
        }
    }
    if(validCoords.length < 50) {
         for(let r=20; r<30; r++) for(let c=20; c<30; c++) {
            wallSet.delete(`${c},${r}`);
            validCoords.push({c,r});
        }
    }

    const pickSpot = (minDist = 0, refX = 0, refY = 0) => {
        let spot = {x:0, y:0};
        let found = false;
        let tries = 0;
        while(!found && tries < 500) {
            const rnd = validCoords[Math.floor(Math.random() * validCoords.length)];
            const tx = rnd.c * TILE_SIZE + TILE_SIZE/2;
            const ty = rnd.r * TILE_SIZE + TILE_SIZE/2;
            if(minDist > 0) {
                if(Math.hypot(tx - refX, ty - refY) > minDist) { spot.x = tx; spot.y = ty; found = true; }
            } else { spot.x = tx; spot.y = ty; found = true; }
            tries++;
        }
        if(!found && validCoords.length > 0) { 
            const f = validCoords[0]; 
            spot.x = f.c*TILE_SIZE+TILE_SIZE/2; 
            spot.y = f.r*TILE_SIZE+TILE_SIZE/2; 
        }
        return spot;
    };

    const pSpot = pickSpot();
    player.x = pSpot.x;
    player.y = pSpot.y;
    player.lastX = pSpot.x;
    player.lastY = pSpot.y;
    
    impostors = [];
    for(let i=0; i<impostorCount; i++) {
        const iSpot = pickSpot(600, player.x, player.y);
        impostors.push({
            x: iSpot.x, y: iSpot.y, radius: 20, speed: 15.0, // 內鬼速度調整為玩家(5.0)的 3 倍
            state: 'patrol', target: getRandomPoint(), 
            waitTimer: 0, stuckTimer: 0, stunTimer: 0, 
            isDead: false,
            lastPos: {x: iSpot.x, y: iSpot.y},
            walkAnim: 0,
            lastX: iSpot.x,
            lastY: iSpot.y,
            freezeTimer: (gameMode === 'HIDE_SEEK') ? 600 : 0, 
            isTrapped: false
        });
    }

    tasks = [];
    for(let i=0; i<TOTAL_TASKS; i++) {
        let tSpot;
        let valid = false;
        let attempts = 0;
        while(!valid && attempts < 100) {
            tSpot = pickSpot(200, player.x, player.y);
            let overlaps = false;
            for(let existingTask of tasks) {
                if(Math.hypot(tSpot.x - existingTask.x, tSpot.y - existingTask.y) < 60) {
                    overlaps = true;
                    break;
                }
            }
            if(!overlaps) valid = true;
            attempts++;
        }
        tasks.push({x: tSpot.x, y: tSpot.y, id: i, completed: false});
    }

    npcs = [];
    for(let i=0; i<NPC_COUNT; i++) {
        const nSpot = pickSpot(100, player.x, player.y);
        npcs.push({
            x: nSpot.x, y: nSpot.y, target: getRandomPoint(),
            waitTimer: Math.random() * 60, speed: 2.0 + Math.random(), facingRight: true,
            walkAnim: 0,
            lastX: nSpot.x,
            lastY: nSpot.y,
            taskTarget: null,
            taskTimer: 0,
            isDead: false
        });
    }
    
    const maxTaskEl = document.getElementById('max-task-count');
    if (maxTaskEl) maxTaskEl.innerText = TOTAL_TASKS;
}

const FIXED_STEP = 1000 / 60;
let accumulator = 0;

function lerp(start, end, t) {
    return start * (1 - t) + end * t;
}

function saveLastState() {
    player.lastX = player.x;
    player.lastY = player.y;
    impostors.forEach(imp => { imp.lastX = imp.x; imp.lastY = imp.y; });
    npcs.forEach(npc => { npc.lastX = npc.x; npc.lastY = npc.y; });
}

function recordGameState() {
    const snapshot = {
        player: { x: player.x, y: player.y },
        impostors: impostors.map(i => ({ x: i.x, y: i.y })),
        npcs: npcs.map(n => ({ x: n.x, y: n.y }))
    };
    gameHistory.push(snapshot);
    if (gameHistory.length > HISTORY_DURATION) {
        gameHistory.shift();
    }
}

function triggerTimeRewind() {
    if (gameHistory.length === 0) return;
    const pastState = gameHistory[0];
    
    player.x = pastState.player.x;
    player.y = pastState.player.y;
    player.lastX = player.x;
    player.lastY = player.y;
    
    impostors.forEach((imp, i) => {
        if (pastState.impostors[i]) {
            imp.x = pastState.impostors[i].x;
            imp.y = pastState.impostors[i].y;
            imp.lastX = imp.x;
            imp.lastY = imp.y;
        }
    });

    npcs.forEach((npc, i) => {
        if (pastState.npcs[i]) {
            npc.x = pastState.npcs[i].x;
            npc.y = pastState.npcs[i].y;
            npc.lastX = npc.x;
            npc.lastY = npc.y;
        }
    });
    
    gameHistory = [];
    showNotification("💥 觸發被動：時光倒流 (10秒前)！");
}

function loop(timestamp) {
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    
    if (dt > 1000) dt = 1000;
    
    accumulator += dt;

    let updates = 0;
    while (accumulator >= FIXED_STEP && updates < 5) { 
        if (!isPaused && (gameState === 'PLAY' || gameState === 'TASK')) {
            saveLastState();
            recordGameState(); 
            update();
        }
        accumulator -= FIXED_STEP;
        updates++;
    }
    
    const alpha = accumulator / FIXED_STEP;

    if (isMapOpen) drawMap();
    draw(alpha);
    requestAnimationFrame(loop);
}

function update() {
    let mx = 0, my = 0;

    if(keys['w'] || keys['arrowup']) my = -1;
    if(keys['s'] || keys['arrowdown']) my = 1;
    if(keys['a'] || keys['arrowleft']) mx = -1;
    if(keys['d'] || keys['arrowright']) mx = 1;
    if(joystick.active) {
        mx = joystick.dx / 50; my = joystick.dy / 50;
        const len = Math.hypot(mx, my);
        if(len > 1) { mx /= len; my /= len; }
    }

    if (player.subClass === 'MAPPER') {
        const pc = Math.floor(player.x / TILE_SIZE);
        const pr = Math.floor(player.y / TILE_SIZE);
        const radius = 4;
        for(let r = pr - radius; r <= pr + radius; r++) {
            for(let c = pc - radius; c <= pc + radius; c++) {
                if (c >= 0 && c < MAP_COLS && r >= 0 && r < MAP_ROWS) {
                    if (Math.hypot(c - pc, r - pr) <= radius) {
                        exploredCells.add(`${c},${r}`);
                    }
                }
            }
        }
    }

    if (gameState === 'TASK') {
        if (Math.abs(mx) > 0.1 || Math.abs(my) > 0.1) {
            cancelTask();
        } else {
            if (activeTaskType === 'CALIBRATION') {
                updateCalibrationGame();
            }
        }
    }
    
    if (gameState === 'PLAY' || gameState === 'TASK') {
        if (gameMode === 'HIDE_SEEK') {
            survivalTimer -= (FIXED_STEP / 1000);
            updateHUD();
            if (survivalTimer <= 0) {
                document.getElementById('win-reason').innerText = "時間到！躲藏者獲勝！";
                endGame('WIN');
                return;
            }
        }

        if (player.isInTeleport) {
            player.teleportTimer -= (FIXED_STEP / 1000) * 60;
            if (player.teleportTimer <= 0) {
                player.isInTeleport = false; 
                showNotification("傳送陣失效，強制現身！");
            }

            if (telepads.length > 1) {
                if (keys['d'] || keys['arrowright'] || keys['w'] || keys['arrowup']) {
                    if (!keys.lock) {
                        player.currentPadIndex = (player.currentPadIndex + 1) % telepads.length;
                        keys.lock = true;
                    }
                } else if (keys['a'] || keys['arrowleft'] || keys['s'] || keys['arrowdown']) {
                    if (!keys.lock) {
                        player.currentPadIndex = (player.currentPadIndex - 1 + telepads.length) % telepads.length;
                        keys.lock = true;
                    }
                } else if (joystick.active) {
                     if (!keys.lock) {
                        player.currentPadIndex = (player.currentPadIndex + 1) % telepads.length;
                        keys.lock = true;
                     }
                } else {
                    keys.lock = false;
                }
                
                const target = telepads[player.currentPadIndex];
                player.x = target.x;
                player.y = target.y;
            }
        } else {
            if (mx !== 0 || my !== 0 && !joystick.active) {
                const len = Math.hypot(mx, my);
                if (len > 0) { mx /= len; my /= len; }
            }
            
            if (mx !== 0) player.facingRight = mx > 0;

            if (mx !== 0 || my !== 0) {
                player.walkAnim += 0.25;
            } else {
                player.walkAnim = 0;
            }
            
            let currentSpeed = player.speed;
            if (player.subClass === 'RUNNER') {
                let impostorInSight = false;
                for(let imp of impostors) {
                     if (!imp.isDead && imp.stunTimer <= 0) {
                         const d = Math.hypot(imp.x - player.x, imp.y - player.y);
                         if (d < 600) { 
                             impostorInSight = true;
                             break;
                         }
                     }
                }
                if (impostorInSight) currentSpeed = 6.0;
            }

            if(activeSkills.has('SPRINT')) {
                let isSprintPressed = keys['shift'] || skillInput['SPRINT'];
                
                if (player.sprint.fatigue > 0) {
                    player.sprint.fatigue--;
                    player.sprint.state = 'COOLDOWN';
                } else if (!isSprintPressed && player.sprint.stamina < player.sprint.maxStamina) {
                    player.sprint.stamina += 1;
                    player.sprint.state = 'READY';
                }

                if (isSprintPressed && player.sprint.fatigue <= 0) {
                    if (player.sprint.stamina > 0) {
                        player.sprint.state = 'ACTIVE';
                        player.sprint.stamina -= 2; 
                        currentSpeed = player.sprint.speedBuff;
                    } else {
                        player.sprint.fatigue = 120; 
                        player.sprint.state = 'COOLDOWN';
                    }
                }
            }

            let ignoreCollision = (activeSkills.has('WALLWALK') && player.wallwalk.state === 'ACTIVE');
            if (activeSkills.has('SPIRIT') && player.spirit.state === 'ACTIVE') ignoreCollision = true;
            
            if (Math.abs(mx) > 0.01 || Math.abs(my) > 0.01) {
                moveEntity(player, mx * currentSpeed, my * currentSpeed, ignoreCollision);
            }
            if (gameState === 'PLAY') {
                processActiveSkills();
            }
            checkTasks();
        }

        let targetX = player.x - canvas.width / 2;
        let targetY = player.y - canvas.height / 2;
        targetX = Math.max(0, Math.min(targetX, WORLD_WIDTH - canvas.width));
        targetY = Math.max(0, Math.min(targetY, WORLD_HEIGHT - canvas.height));
        
        camera.x += (targetX - camera.x) * 0.15;
        camera.y += (targetY - camera.y) * 0.15;
        
        updateImpostors();
        updateSkillLogic();
        updateNPCs();
        updateTraps();
        updateAbilities();
    }
}

function updateSkillLogic() {
    if (activeSkills.has('SPIRIT')) {
        const s = player.spirit;
        if (s.state === 'ACTIVE') {
            s.timer--;
            if (s.timer <= 0) {
                document.getElementById('death-reason').innerText = "魂飛魄散（靈魂出竅超時）";
                endGame('LOSS');
            }
        }
    }

    const skillList = ['scan', 'disguise', 'eagle', 'alert', 'wallwalk', 'avenger', 'teleporter', 'repel', 'swap', 'gamble', 'trapper'];
    skillList.forEach(key => {
        if (player[key]) {
            const s = player[key];
            if (s.state === 'ACTIVE') {
                s.timer--;
                if (s.timer <= 0) {
                    s.state = 'COOLDOWN';
                    s.timer = isAwakenedRole ? s.maxCooldown / 2 : s.maxCooldown;
                    if (key === 'wallwalk') checkWallStuck();
                }
            } else if (s.state === 'COOLDOWN') {
                s.timer--;
                if (s.timer <= 0) {
                    s.state = 'READY';
                }
            }
        }
    });
}

function processActiveSkills() {
    const SKILL_KEYS = {
        'SCAN': 'q',
        'DISGUISE': 'e',
        'EAGLE': 'r',
        'ALERT': 'f',
        'WALLWALK': 'g',
        'AVENGER': 't',
        'TELEPORTER': 'h',
        'REPEL': 'v',
        'SWAP': 'c',
        'SPIRIT': 'b',
        'GAMBLE': 'j',
        'TRAPPER': 'k'
    };

    activeSkills.forEach(skillName => {
        if (skillName === 'SPRINT') return;

        let key = SKILL_KEYS[skillName];
        let isPressed = keys[key] || skillInput[skillName];

        if (isPressed) {
            if (!skillLocks[skillName]) {
                activateSkillLogic(skillName);
                skillLocks[skillName] = true;
            }
        } else {
            skillLocks[skillName] = false;
        }
    });
}

function activateSkillLogic(selectedSkill) {
    let skillObj = null;
    if(selectedSkill === 'SCAN') skillObj = player.scan;
    else if(selectedSkill === 'DISGUISE') skillObj = player.disguise;
    else if(selectedSkill === 'EAGLE') skillObj = player.eagle;
    else if(selectedSkill === 'ALERT') skillObj = player.alert;
    else if(selectedSkill === 'WALLWALK') skillObj = player.wallwalk;
    else if(selectedSkill === 'AVENGER') skillObj = player.avenger;
    else if(selectedSkill === 'TELEPORTER') skillObj = player.teleporter;
    else if(selectedSkill === 'REPEL') skillObj = player.repel;
    else if(selectedSkill === 'SWAP') skillObj = player.swap;
    else if(selectedSkill === 'SPIRIT') skillObj = player.spirit;
    else if(selectedSkill === 'GAMBLE') skillObj = player.gamble;
    else if(selectedSkill === 'TRAPPER') skillObj = player.trapper;

    if(skillObj) {
        if(selectedSkill === 'TELEPORTER') {
            if(skillObj.state === 'READY') {
                telepads.push({x: player.x, y: player.y});
                if(telepads.length > 4) telepads.shift(); 
                showNotification("傳送陣已設置 (" + telepads.length + "/4)");
                
                skillObj.state = 'COOLDOWN'; 
                skillObj.timer = isAwakenedRole ? skillObj.maxCooldown / 2 : skillObj.maxCooldown;
            }
        } else if (selectedSkill === 'REPEL') {
            if(skillObj.state === 'READY') {
                const range = 250; 
                const entities = [...impostors, ...npcs];
                let hit = false;
                
                entities.forEach(ent => {
                    const dist = Math.hypot(player.x - ent.x, player.y - ent.y);
                    if (dist < range) {
                        hit = true;
                        const corners = [
                            {x: TILE_SIZE, y: TILE_SIZE}, 
                            {x: WORLD_WIDTH - TILE_SIZE, y: TILE_SIZE},
                            {x: TILE_SIZE, y: WORLD_HEIGHT - TILE_SIZE},
                            {x: WORLD_WIDTH - TILE_SIZE, y: WORLD_HEIGHT - TILE_SIZE}
                        ];
                        
                        let maxD = -1;
                        let target = corners[0];
                        
                        corners.forEach(c => {
                            const d = Math.hypot(player.x - c.x, player.y - c.y);
                            if (d > maxD) {
                                maxD = d;
                                target = c;
                            }
                        });
                        
                        if (isWall(Math.floor(target.x/TILE_SIZE), Math.floor(target.y/TILE_SIZE))) {
                            let safe = getRandomPoint();
                            ent.x = safe.x;
                            ent.y = safe.y;
                        } else {
                            ent.x = target.x;
                            ent.y = target.y;
                        }
                    }
                });
                
                if (hit) showNotification("敵人已彈飛！");
                else showNotification("周圍沒有目標");

                skillObj.state = 'COOLDOWN'; 
                skillObj.timer = isAwakenedRole ? skillObj.maxCooldown / 2 : skillObj.maxCooldown;
            }

        } else if (selectedSkill === 'SWAP') {
            if(skillObj.state === 'READY') {
                if (npcs.length > 0) {
                    const targetNPC = npcs[Math.floor(Math.random() * npcs.length)];
                    
                    const tempX = player.x;
                    const tempY = player.y;
                    player.x = targetNPC.x;
                    player.y = targetNPC.y;
                    targetNPC.x = tempX;
                    targetNPC.y = tempY;
                    
                    showNotification("位置交換！獲得3秒無敵！");
                    skillObj.state = 'ACTIVE'; 
                    skillObj.timer = skillObj.duration;
                } else {
                    showNotification("無可交換目標！");
                }
            }
        } else if (selectedSkill === 'SPIRIT') {
             if (skillObj.state === 'READY') {
                 skillObj.state = 'ACTIVE';
                 skillObj.timer = skillObj.duration;
                 skillObj.bodyX = player.x;
                 skillObj.bodyY = player.y;
                 showNotification("靈魂出竅！10秒內必須回魂！");
                 
                 skillInput['SPIRIT'] = false; 
             } else if (skillObj.state === 'ACTIVE') {
                 player.x = skillObj.bodyX;
                 player.y = skillObj.bodyY;
                 player.lastX = player.x;
                 player.lastY = player.y;
                 
                 skillObj.state = 'READY'; 
                 showNotification("回魂成功！");
                 
                 skillInput['SPIRIT'] = false; 
             }
        } else if (selectedSkill === 'GAMBLE') {
            if (skillObj.state === 'READY' && skillObj.charges > 0) {
                skillObj.charges--;
                skillObj.state = 'COOLDOWN'; 
                skillObj.timer = skillObj.maxCooldown;

                if (Math.random() < 0.5) {
                    document.getElementById('death-reason').innerText = "賭徒的末路（賭博失敗）";
                    endGame('LOSS');
                } else {
                    const possibleSkills = ['SCAN', 'DISGUISE', 'SPRINT', 'EAGLE', 'ALERT', 'WALLWALK', 'AVENGER', 'TELEPORTER', 'REPEL', 'SWAP', 'SPIRIT', 'TRAPPER'];
                    const newSkill = possibleSkills[Math.floor(Math.random() * possibleSkills.length)];
                    
                    activeSkills.add(newSkill);
                    
                    let skillText = "";
                    if(newSkill === 'SCAN') skillText = "獲得技能：掃描器";
                    else if(newSkill === 'DISGUISE') skillText = "獲得技能：偽裝系統";
                    else if(newSkill === 'SPRINT') skillText = "獲得技能：極速衝刺";
                    else if(newSkill === 'EAGLE') skillText = "獲得技能：鷹眼";
                    else if(newSkill === 'ALERT') skillText = "獲得技能：警戒";
                    else if(newSkill === 'WALLWALK') skillText = "獲得技能：穿牆術";
                    else if(newSkill === 'AVENGER') skillText = "獲得技能：反殺者";
                    else if(newSkill === 'TELEPORTER') skillText = "獲得技能：傳送師";
                    else if(newSkill === 'REPEL') skillText = "獲得技能：別過來";
                    else if(newSkill === 'SWAP') skillText = "獲得技能：隨機傳送";
                    else if(newSkill === 'SPIRIT') skillText = "獲得技能：靈魂出竅";
                    else if(newSkill === 'TRAPPER') skillText = "獲得技能：設陷者";

                    showNotification(`賭博大成功！${skillText}`);
                    
                    const newSkillKey = newSkill.toLowerCase();
                    if(player[newSkillKey]) {
                        player[newSkillKey].state = 'READY';
                        player[newSkillKey].timer = 0;
                        if (newSkill === 'SPRINT') player[newSkillKey].stamina = player[newSkillKey].maxStamina;
                    }
                }
            }
        } else if (selectedSkill === 'TRAPPER') {
            if(skillObj.state === 'READY') {
                traps.push({
                    x: player.x,
                    y: player.y,
                    active: true,
                    victim: null,
                    timer: 0
                });
                showNotification("陷阱已放置！");
                skillObj.state = 'COOLDOWN';
                skillObj.timer = isAwakenedRole ? skillObj.maxCooldown / 2 : skillObj.maxCooldown;
            }
        } else {
            if(skillObj.state === 'READY') {
                skillObj.state = 'ACTIVE';
                skillObj.timer = skillObj.duration;
            }
        }
    }
}
