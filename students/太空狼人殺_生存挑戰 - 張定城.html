function updateTraps() {
    for (let i = traps.length - 1; i >= 0; i--) {
        const trap = traps[i];
        if (trap.victim) {
            trap.timer++;
            const victim = trap.victim;
            let rescued = false;
            for(let otherImp of impostors) {
                if (otherImp !== victim && !otherImp.isDead) {
                    if (Math.hypot(otherImp.x - trap.x, otherImp.y - trap.y) < 50) {
                        rescued = true;
                        break;
                    }
                }
            }
            if (!rescued) {
                for(let npc of npcs) {
                    if (Math.hypot(npc.x - trap.x, npc.y - trap.y) < 50) {
                        rescued = true;
                        break;
                    }
                }
            }
            
            if (rescued) {
                showNotification("內鬼已被救出！");
                victim.isTrapped = false;
                trap.active = false;
                traps.splice(i, 1);
                continue;
            }
            
            if (trap.timer > 300) { 
                victim.isDead = true;
                victim.isTrapped = false;
                showNotification("陷阱處決成功！");
                if (Math.random() < 0.3) {
                    trap.victim = null;
                    trap.timer = 0;
                    trap.active = true;
                    showNotification("陷阱自動重置！");
                } else {
                    traps.splice(i, 1);
                }
            }
        } else {
            for(let imp of impostors) {
                if (!imp.isDead && !imp.isTrapped) {
                    if (Math.hypot(imp.x - trap.x, imp.y - trap.y) < 20) {
                        imp.isTrapped = true;
                        trap.victim = imp;
                        trap.timer = 0;
                        showNotification("內鬼踩到陷阱了！");
                        break; 
                    }
                }
            }
        }
    }
}

function updateImpostors() {
    let activeImpostors = impostors.filter(imp => !imp.isDead);

    if (gameMode !== 'HIDE_SEEK' && activeImpostors.length === 0) {
        endGame('KILL');
        return;
    }

    let detectionRange = 600;
    if (player.subClass === 'STEALTH') {
        detectionRange = 350; 
    }
    
    activeImpostors.forEach(impostor => {
        if (impostor.isTrapped) return;
        if (impostor.freezeTimer > 0) { 
            impostor.freezeTimer--; 
            return; 
        }
        if (impostor.stunTimer > 0) { impostor.stunTimer--; impostor.walkAnim = 0; return; }

        let target = null;
        let minDist = Infinity;
        
        let potentialTargets = [];
        if (!player.dead) potentialTargets.push({entity: player, x: player.x, y: player.y, isPlayer: true});
        npcs.forEach(n => { if(!n.isDead) potentialTargets.push({entity: n, x: n.x, y: n.y, isPlayer: false}); });
        
        potentialTargets.forEach(t => {
            const d = Math.hypot(t.x - impostor.x, t.y - impostor.y);
            if (d < minDist) {
                minDist = d;
                target = t;
            }
        });

        if (gameMode === 'HIDE_SEEK') {
            if (target) {
                if (!impostor.pathTimer) impostor.pathTimer = 0;
                impostor.pathTimer++;
                
                let moveTarget = {x: target.x, y: target.y};
                
                if (impostor.pathTimer > 10) { 
                     impostor.pathTimer = 0;
                     let nextStep = bfsNextMove(impostor.x, impostor.y, target.x, target.y);
                     impostor.bfsTarget = nextStep;
                }
                
                if (impostor.bfsTarget) {
                     moveTarget = impostor.bfsTarget;
                }
                
                const angle = Math.atan2(moveTarget.y - impostor.y, moveTarget.x - impostor.x);
                const idx = Math.cos(angle) * impostor.speed;
                const idy = Math.sin(angle) * impostor.speed;
                
                if(!checkCollision(impostor.x + idx, impostor.y)) impostor.x += idx;
                if(!checkCollision(impostor.x, impostor.y + idy)) impostor.y += idy;
                
                impostor.walkAnim += 0.25;
                
                const killDist = Math.hypot(target.x - impostor.x, target.y - impostor.y);
                if (killDist < 30) {
                     if (target.isPlayer) {
                         player.dead = true;
                         showNotification("你已死亡！變成幽靈觀戰！");
                     } else {
                         target.entity.isDead = true;
                     }
                }
            }
            return; 
        }
        
        // Survival Mode logic
        const dist = Math.hypot(player.x - impostor.x, player.y - impostor.y);
        let isDisguised = (player.disguise.state === 'ACTIVE');
        if (player.isInTeleport) isDisguised = true;
        let canSee = (!isDisguised && dist < detectionRange);
        
        if (canSee) { impostor.state = 'chase'; impostor.stuckTimer = 0; } 
        else { if(impostor.state === 'chase') { impostor.state = 'patrol'; impostor.target = getRandomPoint(); } }

        let currentMoveTarget = impostor.state === 'chase' ? player : impostor.target;
        
        const angle = Math.atan2(currentMoveTarget.y - impostor.y, currentMoveTarget.x - impostor.x);
        const idx = Math.cos(angle) * impostor.speed;
        const idy = Math.sin(angle) * impostor.speed;
        
        if (idx !== 0 || idy !== 0) impostor.walkAnim += 0.25;

        if(!checkCollision(impostor.x + idx, impostor.y)) impostor.x += idx;
        if(!checkCollision(impostor.x, impostor.y + idy)) impostor.y += idy;
        
        let targetX = player.x;
        let targetY = player.y;
        let isSpiritMode = (player.spirit.state === 'ACTIVE');
        let checkX = isSpiritMode ? player.spirit.bodyX : player.x;
        let checkY = isSpiritMode ? player.spirit.bodyY : player.y;
        const checkDist = Math.hypot(checkX - impostor.x, checkY - impostor.y);

        if(checkDist < 30 && !player.isInTeleport) { 
            if(activeSkills.has('AVENGER') && player.avenger.state === 'ACTIVE') {
                impostor.isDead = true;
                showNotification("擊殺確認：內鬼已清除！");
                return;
            }
            if(activeSkills.has('ALERT') && player.alert.state === 'ACTIVE') {
                impostor.stunTimer = 300; 
                showNotification("防禦成功！內鬼已石化！");
                player.alert.state = 'COOLDOWN'; player.alert.timer = player.alert.maxCooldown;
                return;
            }
            if(activeSkills.has('SWAP') && player.swap.state === 'ACTIVE') return; 
            
            if(isSpiritMode) {
                 if (player.subClass === 'ONE_HIT' && !player.hasRevived) {
                     player.hasRevived = true;
                     triggerTimeRewind();
                     impostor.stunTimer = 60; 
                     return;
                 }
                 document.getElementById('death-reason').innerText = "你的肉體已被摧毀";
                 endGame('LOSS');
                 return;
            } else {
                if (player.subClass === 'ONE_HIT' && !player.hasRevived) {
                    player.hasRevived = true;
                    triggerTimeRewind();
                    impostor.stunTimer = 60; 
                    return;
                }
                if(player.disguise.state !== 'ACTIVE') { 
                    player.dead = true;
                    document.getElementById('death-reason').innerText = "你已被內鬼殺害";
                    endGame('LOSS'); 
                    return; 
                }
            }
        }
    });
}

function updateNPCs() {
    npcs.forEach(npc => {
        if (npc.isDead) return;

        let fleeing = false;
        for(let imp of impostors) {
            if (imp.isDead || imp.stunTimer > 0 || imp.isTrapped || imp.freezeTimer > 0) continue;
            const d = Math.hypot(imp.x - npc.x, imp.y - npc.y);
            if (d < 350) { 
                const angle = Math.atan2(npc.y - imp.y, npc.x - imp.x); 
                const idx = Math.cos(angle) * npc.speed * 1.5; 
                const idy = Math.sin(angle) * npc.speed * 1.5;
                if(!checkCollision(npc.x + idx, npc.y)) npc.x += idx;
                if(!checkCollision(npc.x, npc.y + idy)) npc.y += idy;
                fleeing = true;
                npc.walkAnim += 0.4;
                if (idx !== 0) npc.facingRight = idx > 0;
                break;
            }
        }
        if (fleeing) return; 

        if (gameMode === 'HIDE_SEEK') {
            if (!npc.taskTarget) {
                 const t = tasks[Math.floor(Math.random() * tasks.length)];
                 npc.taskTarget = t;
            } else {
                const d = Math.hypot(npc.taskTarget.x - npc.x, npc.taskTarget.y - npc.y);
                if (d < 20) {
                    npc.taskTimer++;
                    if (npc.taskTimer > 180) { 
                        survivalTimer -= 5;
                        showNotification("隊友完成任務！時間 -5s");
                        npc.taskTarget = null;
                        npc.taskTimer = 0;
                    }
                } else {
                    const angle = Math.atan2(npc.taskTarget.y - npc.y, npc.taskTarget.x - npc.x);
                    const idx = Math.cos(angle) * npc.speed;
                    const idy = Math.sin(angle) * npc.speed;
                    if(!checkCollision(npc.x + idx, npc.y)) npc.x += idx;
                    if(!checkCollision(npc.x, npc.y + idy)) npc.y += idy;
                    npc.walkAnim += 0.25;
                    if (idx !== 0) npc.facingRight = idx > 0;
                }
            }
            return;
        }

        if (Math.hypot(npc.target.x - npc.x, npc.target.y - npc.y) < 10) {
            npc.waitTimer++;
            npc.walkAnim = 0; 
            if(npc.waitTimer > 100) { npc.target = getRandomPoint(); npc.waitTimer = 0; }
            return;
        }
        const angle = Math.atan2(npc.target.y - npc.y, npc.target.x - npc.x);
        const idx = Math.cos(angle) * npc.speed;
        const idy = Math.sin(angle) * npc.speed;
        
        if (idx !== 0 || idy !== 0) npc.walkAnim += 0.25;
        if (idx !== 0) npc.facingRight = idx > 0;
        
        if(!checkCollision(npc.x + idx, npc.y)) npc.x += idx;
        if(!checkCollision(npc.x, npc.y + idy)) npc.y += idy;
    });
}

function checkTasks() {
    const btn = document.getElementById('action-btn');
    
    if (player.spirit.state === 'ACTIVE') {
        btn.classList.remove('active');
        return;
    }

    let near = false;
    
    let onPubPad = null;
    for (let i = 0; i < publicTelepads.length; i++) {
        if (Math.hypot(player.x - publicTelepads[i].x, player.y - publicTelepads[i].y) < 40) {
            onPubPad = publicTelepads[i];
            break;
        }
    }

    let onPadIndex = -1;
    if (!onPubPad) {
        for (let i = 0; i < telepads.length; i++) {
            if (Math.hypot(player.x - telepads[i].x, player.y - telepads[i].y) < 30) {
                onPadIndex = i;
                break;
            }
        }
    }

    if (onPubPad && player.publicTeleportsLeft > 0) {
        near = true;
        btn.classList.add('active');
        if (isActionPressed && gameState === 'PLAY' && !keys.spaceLock) {
            let otherPads = publicTelepads.filter(p => p !== onPubPad);
            let targetPad = otherPads[Math.floor(Math.random() * otherPads.length)];
            player.x = targetPad.x;
            player.y = targetPad.y;
            player.lastX = player.x;
            player.lastY = player.y;
            player.publicTeleportsLeft--;
            showNotification(`已使用公共傳送陣！(剩餘 ${player.publicTeleportsLeft} 次)`);
            updateHUD();
            keys.spaceLock = true;
        } else if (!isActionPressed) {
            keys.spaceLock = false;
        }
    } else if (player.isInTeleport) {
        near = true;
        btn.classList.add('active');
        if (isActionPressed && gameState === 'PLAY' && !keys.spaceLock) {
            player.isInTeleport = false;
            keys.spaceLock = true;
        } else if (!isActionPressed) {
            keys.spaceLock = false;
        }
    } else if (onPadIndex !== -1) {
        near = true;
        btn.classList.add('active');
        if (isActionPressed && gameState === 'PLAY' && !keys.spaceLock) {
            player.isInTeleport = true;
            player.teleportTimer = 5 * 60; 
            player.currentPadIndex = onPadIndex;
            keys.spaceLock = true;
        } else if (!isActionPressed) {
            keys.spaceLock = false;
        }
    } else {
        for(let t of tasks) {
            if(t.completed) continue;
            if (Math.hypot(player.x - t.x, player.y - t.y) < 50) {
                near = true;
                btn.classList.add('active');
                if(isActionPressed && gameState === 'PLAY') startTask(t);
                break;
            }
        }
    }

    if(!near) {
        btn.classList.remove('active');
        if(gameState === 'TASK' && currentTask && Math.hypot(player.x - currentTask.x, player.y - currentTask.y) > 60) cancelTask();
    }
}

function startTask(t) { 
    currentTask = t; 
    gameState = 'TASK'; 
    document.getElementById('task-ui').classList.remove('hidden');
    
    activeTaskType = Math.random() < 0.5 ? 'CALIBRATION' : 'WIRES';
    
    if (activeTaskType === 'CALIBRATION') {
        document.getElementById('task-title').innerText = "精準校準";
        document.getElementById('task-desc').innerHTML = '當指針進入 <span class="text-green-400 font-bold">綠色</span> 區域時按下互動鍵';
        document.getElementById('game-calibration').classList.remove('hidden');
        document.getElementById('game-wires').classList.add('hidden');
        miniGame.stage = 0;
        document.getElementById('minigame-stage').innerText = '0';
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        resetMiniGameRound();
    } else {
        document.getElementById('task-title').innerText = "連接線路";
        document.getElementById('task-desc').innerText = "拖曳左側接頭至右側對應顏色";
        document.getElementById('game-wires').classList.remove('hidden');
        document.getElementById('game-calibration').classList.add('hidden');
        initWireGame();
    }
}

function cancelTask() { 
    gameState = 'PLAY'; 
    currentTask = null; 
    document.getElementById('task-ui').classList.add('hidden'); 
}

function completeTask() { 
    currentTask.completed = true; 
    completedCount++; 
    cancelTask(); 
    
    if (gameMode === 'HIDE_SEEK') {
        survivalTimer -= 5;
        showNotification("任務完成！生存時間 -5s");
        updateHUD();
        return; 
    }

    if(activeSkills.has('AWAKENED') && completedCount === 3) {
        const skills = ['SCAN', 'DISGUISE', 'SPRINT', 'EAGLE', 'ALERT', 'WALLWALK', 'AVENGER', 'TELEPORTER', 'REPEL', 'SWAP', 'SPIRIT', 'GAMBLE', 'TRAPPER'];
        const newSkill = skills[Math.floor(Math.random() * skills.length)];
        activeSkills.add(newSkill);
        let skillName = newSkill; 
        const skillKey = newSkill.toLowerCase();
        if (player[skillKey]) {
            if (newSkill === 'SPIRIT') { player[skillKey].state = 'READY'; player[skillKey].timer = 0; }
            else if (newSkill === 'SPRINT') { player[skillKey].state = 'READY'; player[skillKey].stamina = player[skillKey].maxStamina; }
            else if (newSkill === 'GAMBLE') { player[skillKey].state = 'READY'; player[skillKey].charges = 3; }
            else { player[skillKey].state = 'COOLDOWN'; player[skillKey].timer = player[skillKey].maxCooldown / 2; }
        }
        showNotification("覺醒成功！獲得裝備：" + skillName);
    }
    updateHUD(); 
    if (completedCount >= TOTAL_TASKS) endGame('WIN'); 
}

function updateHUD() {
    if (gameMode === 'HIDE_SEEK') {
        document.getElementById('hud-title').innerText = "生存倒數";
        document.getElementById('hud-text').innerHTML = `<span class="text-red-400 font-bold text-xl">${Math.max(0, survivalTimer).toFixed(1)}</span> s &nbsp;|&nbsp; 公共傳送: <span class="text-sky-400 font-bold">${player.publicTeleportsLeft}/5</span>`;
        document.getElementById('total-progress').style.width = Math.max(0, (survivalTimer / maxSurvivalTime) * 100) + '%';
    } else {
        document.getElementById('hud-title').innerText = "任務進度";
        document.getElementById('hud-text').innerHTML = `已完成 <span id="task-count">${completedCount}</span> / <span id="max-task-count">${TOTAL_TASKS}</span>`;
        document.getElementById('total-progress').style.width = (completedCount/TOTAL_TASKS*100) + '%';
    }
}

function endGame(result) {
    gameState = result;
    const screen = result === 'WIN' ? 'victory-screen' : (result === 'KILL' ? 'kill-screen' : 'game-over-screen');
    document.getElementById(screen).classList.remove('hidden');
    document.getElementById('alert-text').classList.add('hidden');
    document.getElementById('task-ui').classList.add('hidden');
    
    document.getElementById('map-modal').classList.add('hidden');
    isMapOpen = false;
}

function calculateVisibilityPoints(originX, originY, radius) {
    let points = [];
    const numRays = 120; 
    const step = 20; 
    
    for (let i = 0; i <= numRays; i++) { 
        const angle = (i / numRays) * Math.PI * 2;
        const sin = Math.sin(angle);
        const cos = Math.cos(angle);
        let hitX = originX + cos * radius;
        let hitY = originY + sin * radius;
        
        let lastCheckC = -9999;
        let lastCheckR = -9999;

        for (let d = 0; d < radius; d += step) {
            const tx = originX + cos * d;
            const ty = originY + sin * d;
            
            if(tx < 0 || tx > WORLD_WIDTH || ty < 0 || ty > WORLD_HEIGHT) { 
                hitX = tx; hitY = ty; 
                break; 
            }

            const c = Math.floor(tx/TILE_SIZE);
            const r = Math.floor(ty/TILE_SIZE);

            if (c !== lastCheckC || r !== lastCheckR) {
                if(isWall(c, r)) { 
                    hitX = tx + cos * 10; 
                    hitY = ty + sin * 10; 
                    break; 
                }
                lastCheckC = c;
                lastCheckR = r;
            }
        }
        points.push({x: hitX, y: hitY}); 
    }
    return points;
}

function getRenderPos(entity, alpha) {
    if (Math.abs(entity.x - entity.lastX) > 100 || Math.abs(entity.y - entity.lastY) > 100) {
        return { x: entity.x, y: entity.y };
    }
    return {
        x: lerp(entity.lastX, entity.x, alpha),
        y: lerp(entity.lastY, entity.y, alpha)
    };
}

function draw(alpha = 1.0) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();

    if(player.eagle.state === 'ACTIVE') {
        const scale = 0.7; 
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(scale, scale);
        ctx.translate(-canvas.width/2, -canvas.height/2);
    }

    const pRender = getRenderPos(player, alpha);
    let targetX = pRender.x - canvas.width / 2;
    let targetY = pRender.y - canvas.height / 2;
    targetX = Math.max(0, Math.min(targetX, WORLD_WIDTH - canvas.width));
    targetY = Math.max(0, Math.min(targetY, WORLD_HEIGHT - canvas.height));
    camera.x += (targetX - camera.x) * 0.15;
    camera.y += (targetY - camera.y) * 0.15;

    ctx.translate(-camera.x, -camera.y);

    ctx.fillStyle = COLORS.BG; ctx.fillRect(camera.x, camera.y, canvas.width, canvas.height); 
    ctx.fillStyle = '#fff';
    stars.forEach(s => {
        if (s.x > camera.x - 500 && s.x < camera.x + canvas.width + 500 && s.y > camera.y - 500 && s.y < camera.y + canvas.height + 500) {
            ctx.globalAlpha = s.alpha;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
        }
    });
    ctx.globalAlpha = 1.0;
    
    drawGrid();

    publicTelepads.forEach(pad => {
        ctx.save();
        ctx.translate(pad.x, pad.y);
        ctx.fillStyle = 'rgba(14, 165, 233, 0.3)';
        ctx.beginPath();
        ctx.arc(0, 0, 35, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#0ea5e9';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, 25 + Math.sin(Date.now() / 150) * 5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('公共', 0, 4);
        ctx.restore();
    });

    telepads.forEach((pad, index) => {
        ctx.save();
        ctx.translate(pad.x, pad.y);
        ctx.fillStyle = 'rgba(217, 70, 239, 0.4)';
        ctx.beginPath();
        ctx.arc(0, 0, 25, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = COLORS.TELEPAD;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 15 + Math.sin(Date.now() / 200) * 5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    });

    tasks.forEach(t => {
        if(t.completed) return;
        ctx.fillStyle = COLORS.TASK_OFF;
        const pulse = Math.sin(Date.now()/200)*2;
        ctx.fillRect(t.x-15-pulse, t.y-15-pulse, 30+pulse*2, 30+pulse*2);
    });

    traps.forEach(trap => {
        if(trap.active || trap.victim) {
            ctx.save();
            ctx.translate(trap.x, trap.y);
            ctx.fillStyle = COLORS.TRAP;
            ctx.beginPath();
            ctx.moveTo(-15, -15);
            ctx.lineTo(15, -15);
            ctx.lineTo(15, 15);
            ctx.lineTo(-15, 15);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#713f12';
            ctx.lineWidth = 2;
            const spikeOffset = Math.abs(Math.sin(Date.now() / 200)) * 5;
            ctx.beginPath();
            ctx.moveTo(-10, -10 + spikeOffset); ctx.lineTo(-10, 10 - spikeOffset);
            ctx.moveTo(0, -10 + spikeOffset); ctx.lineTo(0, 10 - spikeOffset);
            ctx.moveTo(10, -10 + spikeOffset); ctx.lineTo(10, 10 - spikeOffset);
            ctx.stroke();
            ctx.restore();
        }
    });

    const startCol = Math.max(0, Math.floor(camera.x / TILE_SIZE));
    const endCol = Math.min(MAP_COLS, startCol + Math.ceil(canvas.width / TILE_SIZE) + 1);
    const startRow = Math.max(0, Math.floor(camera.y / TILE_SIZE));
    const endRow = Math.min(MAP_ROWS, startRow + Math.ceil(canvas.height / TILE_SIZE) + 1);
    ctx.fillStyle = COLORS.WALL;
    for (let c = startCol; c <= endCol; c++) {
        for (let r = startRow; r <= endRow; r++) {
            if (isWall(c, r)) {
                ctx.fillRect(c*TILE_SIZE, r*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                ctx.strokeStyle = '#334155';
                ctx.strokeRect(c*TILE_SIZE, r*TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    npcs.forEach(n => { 
        const nRender = getRenderPos(n, alpha);
        if (nRender.x >= camera.x - 50 && nRender.x <= camera.x + canvas.width + 50 &&
            nRender.y >= camera.y - 50 && nRender.y <= camera.y + canvas.height + 50) {
            drawCharacter(nRender.x, nRender.y, COLORS.NPC_BODY, n.facingRight, false, null, n.walkAnim); 
        }
    });
    
    impostors.forEach(impostor => {
        const iRender = getRenderPos(impostor, alpha);
        if (iRender.x >= camera.x - 50 && iRender.x <= camera.x + canvas.width + 50 &&
            iRender.y >= camera.y - 50 && iRender.y <= camera.y + canvas.height + 50) {
            if(impostor.isDead) {
                ctx.save(); ctx.translate(impostor.x, impostor.y);
                ctx.fillStyle = COLORS.IMPOSTOR_DEAD;
                ctx.beginPath(); ctx.ellipse(0, 10, 20, 10, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#cc0000'; ctx.beginPath(); ctx.ellipse(5, 5, 8, 8, 0, 0, Math.PI*2); ctx.fill(); 
                ctx.restore();
                return;
            }
            let impColor = (gameMode === 'HIDE_SEEK') ? COLORS.IMPOSTOR_RED : COLORS.IMPOSTOR_BODY;
            if(impostor.stunTimer > 0) impColor = COLORS.IMPOSTOR_STUNNED;
            if(impostor.isTrapped) impColor = COLORS.TRAP; 

            let facingRight = iRender.x > impostor.lastX;
            if(Math.abs(iRender.x - impostor.lastX) < 0.1) {
                 if (player.spirit.state === 'ACTIVE') facingRight = impostor.x < player.spirit.bodyX;
                 else facingRight = impostor.x < pRender.x;
            }
            
            drawCharacter(iRender.x, iRender.y, impColor, facingRight, true, impostor, impostor.walkAnim);
            
            if(impostor.isTrapped) {
                 ctx.save();
                 ctx.translate(iRender.x, iRender.y - 50);
                 ctx.fillStyle = "orange";
                 ctx.font = "bold 14px Arial";
                 ctx.textAlign = "center";
                 ctx.fillText("TRAPPED!", 0, 0);
                 ctx.restore();
            }
        }
    });
    
    if (!player.isInTeleport) {
        let pColor = player.color;
        if(player.disguise.state === 'ACTIVE') pColor = COLORS.PLAYER_DISGUISED;
        if(player.wallwalk.state === 'ACTIVE') pColor = COLORS.PLAYER_PHASE;
        if(player.avenger.state === 'ACTIVE') pColor = COLORS.PLAYER_AVENGER;
        if(player.swap.state === 'ACTIVE') pColor = COLORS.PLAYER_INVINCIBLE;
        if(player.spirit.state === 'ACTIVE') pColor = COLORS.PLAYER_SPIRIT;
        if(player.dead && gameMode === 'HIDE_SEEK') pColor = COLORS.PLAYER_GHOST;
        
        if (player.spirit.state === 'ACTIVE') {
            ctx.save();
            ctx.strokeStyle = 'rgba(139, 92, 246, 0.4)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(player.spirit.bodyX, player.spirit.bodyY);
            ctx.lineTo(pRender.x, pRender.y);
            ctx.stroke();
            ctx.restore();
            
            drawCharacter(player.spirit.bodyX, player.spirit.bodyY, COLORS.PLAYER_SHELL, player.facingRight, false, null, 0); 
        }

        if(player.spirit.state === 'ACTIVE') ctx.globalAlpha = 0.7;
        drawCharacter(pRender.x, pRender.y, pColor, player.facingRight, false, null, player.walkAnim);
        if(player.spirit.state === 'ACTIVE') ctx.globalAlpha = 1.0;

        if(player.alert.state === 'ACTIVE') {
            ctx.save(); ctx.translate(pRender.x, pRender.y); ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(251, 146, 60, 0.7)'; ctx.lineWidth = 4; ctx.stroke();
            ctx.fillStyle = 'rgba(251, 146, 60, 0.2)'; ctx.fill(); ctx.restore();
        }

        if(player.swap.state === 'ACTIVE') {
            ctx.save(); ctx.translate(pRender.x, pRender.y); ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(190, 242, 100, 0.7)'; ctx.lineWidth = 3; ctx.stroke();
            ctx.fillStyle = 'rgba(190, 242, 100, 0.2)'; ctx.fill(); ctx.restore();
        }

        if(player.avenger.state === 'ACTIVE') {
            ctx.save(); ctx.translate(pRender.x, pRender.y);
            if(!player.facingRight) ctx.scale(-1, 1);
            ctx.translate(20, 0); ctx.rotate(-Math.PI / 4);
            ctx.shadowBlur = 15; ctx.shadowColor = '#ef4444';
            ctx.fillStyle = '#ef4444'; ctx.fillRect(0, -2, 40, 4); 
            ctx.fillStyle = '#999'; ctx.fillRect(-10, -3, 10, 6); 
            ctx.restore();
        }
        
    } else if (player.isInTeleport) {
        ctx.save();
        ctx.translate(player.x, player.y - 40);
        ctx.fillStyle = "white";
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "center";
        ctx.fillText((player.teleportTimer / 60).toFixed(1) + "s", 0, 0);
        ctx.fillStyle = "#333";
        ctx.fillRect(-20, 5, 40, 6);
        ctx.fillStyle = COLORS.TELEPAD;
        ctx.fillRect(-20, 5, 40 * (player.teleportTimer / 300), 6);
        ctx.restore();
    } else if (player.dead && gameMode !== 'HIDE_SEEK') {
        ctx.save(); ctx.translate(player.x, player.y);
        ctx.fillStyle = COLORS.IMPOSTOR_DEAD;
        ctx.beginPath(); ctx.ellipse(0, 10, 20, 10, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#cc0000'; ctx.beginPath(); ctx.ellipse(5, 5, 8, 8, 0, 0, Math.PI*2); ctx.fill(); 
        ctx.restore();
    }

    if(nearestTask && !player.dead) {
        const angle = Math.atan2(nearestTask.y - pRender.y, nearestTask.x - pRender.x);
        const orbit = 60; const cx = pRender.x + Math.cos(angle) * orbit; const cy = pRender.y + Math.sin(angle) * orbit;
        ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
        const bob = Math.sin(Date.now() / 150) * 5; ctx.translate(bob, 0);
        ctx.fillStyle = COLORS.TASK_OFF; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(-10, 8); ctx.lineTo(-10, -8); ctx.closePath();
        ctx.fill(); ctx.stroke(); ctx.restore();
    }
    
    // Always apply vision fog restriction UNLESS eagle eye, wallwalk, or spirit is active (or dead)
    // Removed the gameMode !== 'HIDE_SEEK' condition to ensure Hide & Seek mode ALSO restricts vision through walls.
    if(player.eagle.state !== 'ACTIVE' && player.wallwalk.state !== 'ACTIVE' && player.spirit.state !== 'ACTIVE' && !player.dead) {
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.98)';
        ctx.beginPath();
        const pad = 2000;
        ctx.rect(camera.x - pad, camera.y - pad, canvas.width + pad*2, canvas.height + pad*2);
        
        const points = calculateVisibilityPoints(pRender.x, pRender.y, 450);
        
        ctx.moveTo(points[0].x, points[0].y);
        for(let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.closePath();
        
        ctx.shadowColor = 'black'; ctx.shadowBlur = 60; 
        ctx.fill('evenodd');
        ctx.restore();
    }
    
    if (player.scan.state === 'ACTIVE' && !player.dead) {
        impostors.forEach(impostor => {
            if(impostor.isDead || impostor.stunTimer > 0) return;
            const iRender = getRenderPos(impostor, alpha);
            const dist = Math.hypot(iRender.x - pRender.x, iRender.y - pRender.y);
            if(dist < 1000) {
                const angle = Math.atan2(iRender.y - pRender.y, iRender.x - pRender.x);
                const orbit = 80; const cx = pRender.x + Math.cos(angle) * orbit; const cy = pRender.y + Math.sin(angle) * orbit;
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
                const pulse = 1 + Math.sin(Date.now() / 50) * 0.2; ctx.scale(pulse, pulse);
                ctx.fillStyle = '#ef4444'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(-12, 10); ctx.lineTo(-12, -10); ctx.closePath();
                ctx.fill(); ctx.stroke(); ctx.restore();
            }
        });
    }

    ctx.restore();
}

function drawGrid() {
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2; ctx.beginPath();
    const startCol = Math.max(0, Math.floor(camera.x / TILE_SIZE));
    const endCol = Math.min(MAP_COLS, startCol + Math.ceil(canvas.width / TILE_SIZE) + 1);
    const startRow = Math.max(0, Math.floor(camera.y / TILE_SIZE));
    const endRow = Math.min(MAP_ROWS, startRow + Math.ceil(canvas.height / TILE_SIZE) + 1);
    for(let c = startCol; c <= endCol; c++) {
        let x = c * TILE_SIZE;
        ctx.moveTo(x, camera.y);
        ctx.lineTo(x, camera.y + canvas.height);
    }
    for(let r = startRow; r <= endRow; r++) {
        let y = r * TILE_SIZE;
        ctx.moveTo(camera.x, y);
        ctx.lineTo(camera.x + canvas.width, y);
    }
    ctx.stroke();
}

function drawMap() {
    const mapCanvas = document.getElementById('mapCanvas');
    if (!mapCanvas) return;
    const mCtx = mapCanvas.getContext('2d');
    mCtx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
    
    const scaleX = mapCanvas.width / (MAP_COLS * TILE_SIZE);
    const scaleY = mapCanvas.height / (MAP_ROWS * TILE_SIZE);
    
    mCtx.fillStyle = '#0f172a';
    mCtx.fillRect(0,0, mapCanvas.width, mapCanvas.height);

    if (player.subClass === 'MAPPER' && mapType === 'RANDOM') {
        mCtx.fillStyle = '#1e293b'; 
        exploredCells.forEach(key => {
            const [c, r] = key.split(',').map(Number);
            if (!isWall(c, r)) { 
                mCtx.fillRect(c * TILE_SIZE * scaleX, r * TILE_SIZE * scaleY, TILE_SIZE * scaleX, TILE_SIZE * scaleY);
            }
        });

        mCtx.fillStyle = '#475569'; 
        exploredCells.forEach(key => {
            const [c, r] = key.split(',').map(Number);
            if (isWall(c, r)) { 
                mCtx.fillRect(c * TILE_SIZE * scaleX, r * TILE_SIZE * scaleY, TILE_SIZE * scaleX, TILE_SIZE * scaleY);
            }
        });
        
    } else {
        mCtx.fillStyle = '#475569'; 
        for(let r=0; r<MAP_ROWS; r++) {
            for(let c=0; c<MAP_COLS; c++) {
                if(isWall(c, r)) {
                    mCtx.fillRect(c * TILE_SIZE * scaleX, r * TILE_SIZE * scaleY, TILE_SIZE * scaleX, TILE_SIZE * scaleY);
                }
            }
        }
        
        mCtx.fillStyle = '#fbbf24';
        tasks.forEach(t => {
            if(!t.completed) {
                mCtx.fillRect(t.x * scaleX - 2, t.y * scaleY - 2, 4, 4);
            }
        });
    }
    
    mCtx.fillStyle = '#0ea5e9';
    mCtx.beginPath();
    mCtx.arc(player.x * scaleX, player.y * scaleY, 4, 0, Math.PI * 2);
    mCtx.fill();
    mCtx.strokeStyle = '#fff';
    mCtx.lineWidth = 1;
    mCtx.stroke();
}

function drawCharacter(x, y, color, facingRight, isImp, impObj, walkAnim = 0) {
    ctx.save(); 
    ctx.translate(x, y); 
    if (!facingRight) ctx.scale(-1, 1);
    
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; 
    ctx.beginPath(); ctx.ellipse(0, 18, 14, 6, 0, 0, Math.PI*2); ctx.fill(); 

    const bobY = Math.abs(Math.sin(walkAnim)) * 2;
    const legOffset = Math.sin(walkAnim) * 5;

    ctx.fillStyle = color;

    ctx.beginPath(); ctx.roundRect(-10, 12 + legOffset, 8, 12, 4); ctx.fill();
    ctx.beginPath(); ctx.roundRect(2, 12 - legOffset, 8, 12, 4); ctx.fill();

    ctx.save();
    ctx.translate(0, -bobY);

    ctx.beginPath(); ctx.roundRect(-22, -8, 10, 24, 4); ctx.fill(); 
    
    ctx.beginPath(); ctx.roundRect(-15, -20, 30, 40, 12); ctx.fill(); 
    
    ctx.fillStyle = '#7dd3fc'; ctx.beginPath(); ctx.roundRect(0, -12, 18, 14, 6); ctx.fill(); 
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(10, -8, 4, 2, 0, 0, Math.PI*2); ctx.fill(); 
    
    ctx.restore(); 

    if(isImp && impObj && impObj.state === 'chase' && impObj.stunTimer <= 0) {
        const dist = Math.hypot(player.x - x, player.y - y);
        
        let targetX = player.spirit.state === 'ACTIVE' ? player.spirit.bodyX : player.x;
        let targetY = player.spirit.state === 'ACTIVE' ? player.spirit.bodyY : player.y;
        
        if(Math.hypot(targetX - x, targetY - y) < 10 * TILE_SIZE) { 
            ctx.save();
            ctx.translate(0, -45 - bobY);
            ctx.fillStyle = 'red'; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-5, -15); ctx.lineTo(5, -15); ctx.fill();
            ctx.beginPath(); ctx.rect(-2, -5, 4, 10); ctx.fillStyle = 'brown'; ctx.fill();
            ctx.restore();
        }
    }
    ctx.restore();
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function updateCalibrationGame() {
    miniGame.cursorPos += miniGame.speed * miniGame.direction;
    if (miniGame.cursorPos >= 100) {
        miniGame.cursorPos = 100;
        miniGame.direction = -1;
    } else if (miniGame.cursorPos <= 0) {
        miniGame.cursorPos = 0;
        miniGame.direction = 1;
    }
    document.getElementById('minigame-cursor').style.left = miniGame.cursorPos + '%';
    
    if (isActionPressed && !keys.spaceLock) {
        handleTaskInput();
        keys.spaceLock = true;
    } else if (!isActionPressed) {
        keys.spaceLock = false;
    }
}

function handleTaskInput() {
    if (activeTaskType === 'CALIBRATION') {
        const hitStart = miniGame.targetStart;
        const hitEnd = miniGame.targetStart + miniGame.targetWidth;
        if (miniGame.cursorPos >= hitStart && miniGame.cursorPos <= hitEnd) {
            miniGame.stage++;
            document.getElementById('minigame-stage').innerText = miniGame.stage;
            document.getElementById(`dot-${miniGame.stage}`).classList.add('active');
            if (miniGame.stage >= 3) completeTask();
            else resetMiniGameRound();
        }
    }
}

function resetMiniGameRound() {
    miniGame.cursorPos = 0;
    miniGame.direction = 1;
    miniGame.targetStart = Math.random() * 70 + 10;
    document.getElementById('minigame-target').style.left = miniGame.targetStart + '%';
    document.getElementById('minigame-target').style.width = miniGame.targetWidth + '%';
}

function initWireGame() {
    wireGame.colors = ['red', 'blue', 'yellow', 'pink'];
    wireGame.leftOrder = [...wireGame.colors].sort(() => Math.random() - 0.5);
    wireGame.rightOrder = [...wireGame.colors].sort(() => Math.random() - 0.5);
    wireGame.connections = [];
    wireGame.dragging = null;
    wireGame.completedCount = 0;

    const leftCol = document.getElementById('wire-left');
    const rightCol = document.getElementById('wire-right');
    leftCol.innerHTML = '';
    rightCol.innerHTML = '';

    wireGame.leftOrder.forEach((color, i) => {
        const div = document.createElement('div');
        div.className = `wire-terminal wire-${color}`;
        div.dataset.side = 'left';
        div.dataset.color = color;
        div.dataset.index = i;
        div.addEventListener('mousedown', onWireDragStart);
        div.addEventListener('touchstart', onWireDragStart, {passive: false});
        leftCol.appendChild(div);
    });

    wireGame.rightOrder.forEach((color, i) => {
        const div = document.createElement('div');
        div.className = `wire-terminal wire-${color}`;
        div.dataset.side = 'right';
        div.dataset.color = color;
        div.dataset.index = i;
        div.addEventListener('mouseup', onWireDrop);
        div.addEventListener('touchend', onWireDrop);
        rightCol.appendChild(div);
    });

    drawWires();
}

function onWireDragStart(e) {
    e.preventDefault();
    if(this.dataset.fixed === 'true') return; 

    const rect = this.getBoundingClientRect();
    const containerRect = document.getElementById('game-wires').getBoundingClientRect();
    
    const startX = rect.left + rect.width/2 - containerRect.left;
    const startY = rect.top + rect.height/2 - containerRect.top;

    wireGame.dragging = {
        color: this.dataset.color,
        startX: startX,
        startY: startY,
        element: this
    };
    
    document.addEventListener('mousemove', onWireDragMove);
    document.addEventListener('touchmove', onWireDragMove, {passive: false});
    document.addEventListener('mouseup', onWireDragEnd);
    document.addEventListener('touchend', onWireDragEnd);
}

function onWireDragMove(e) {
    if(!wireGame.dragging) return;
    e.preventDefault(); 
    
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const containerRect = document.getElementById('game-wires').getBoundingClientRect();

    wireGame.currentMouse.x = clientX - containerRect.left;
    wireGame.currentMouse.y = clientY - containerRect.top;
    
    drawWires();
}

function onWireDrop(e) {
    if(!wireGame.dragging) return;
    
    const targetColor = this.dataset.color;
    if(targetColor === wireGame.dragging.color) {
        const rect = this.getBoundingClientRect();
        const containerRect = document.getElementById('game-wires').getBoundingClientRect();
        const endX = rect.left + rect.width/2 - containerRect.left;
        const endY = rect.top + rect.height/2 - containerRect.top;

        wireGame.connections.push({
            startColor: wireGame.dragging.color,
            startX: wireGame.dragging.startX,
            startY: wireGame.dragging.startY,
            endX: endX,
            endY: endY
        });

        wireGame.dragging.element.dataset.fixed = 'true';
        this.dataset.fixed = 'true';
        this.style.opacity = '0.5'; 
        wireGame.dragging.element.style.opacity = '0.5';

        wireGame.completedCount++;
        if(wireGame.completedCount >= 4) {
            completeTask();
        }
    }
}

function onWireDragEnd(e) {
    wireGame.dragging = null;
    document.removeEventListener('mousemove', onWireDragMove);
    document.removeEventListener('touchmove', onWireDragMove);
    document.removeEventListener('mouseup', onWireDragEnd);
    document.removeEventListener('touchend', onWireDragEnd);
    drawWires();
}

function drawWires() {
    const svg = document.getElementById('wire-svg');
    let html = '';

    wireGame.connections.forEach(conn => {
        const colorHex = getColorHex(conn.startColor);
        html += `<line x1="${conn.startX}" y1="${conn.startY}" x2="${conn.endX}" y2="${conn.endY}" stroke="${colorHex}" stroke-width="8" stroke-linecap="round" />`;
    });

    if(wireGame.dragging) {
        const colorHex = getColorHex(wireGame.dragging.color);
        html += `<line x1="${wireGame.dragging.startX}" y1="${wireGame.dragging.startY}" x2="${wireGame.currentMouse.x}" y2="${wireGame.currentMouse.y}" stroke="${colorHex}" stroke-width="8" stroke-linecap="round" />`;
    }

    svg.innerHTML = html;
}

function getColorHex(name) {
    switch(name) {
        case 'red': return '#ef4444';
        case 'blue': return '#3b82f6';
        case 'yellow': return '#eab308';
        case 'pink': return '#d946ef';
        default: return '#fff';
    }
}

function togglePause() {
    if (gameState === 'MENU' || gameState === 'WIN' || gameState === 'LOSS' || gameState === 'KILL') return;
    
    isPaused = !isPaused;
    
    if (isPaused) {
        document.getElementById('pause-screen').classList.remove('hidden');
    } else {
        document.getElementById('pause-screen').classList.add('hidden');
        lastTime = performance.now(); 
    }
}

function toggleMap() {
    if (gameState === 'MENU' || gameState === 'WIN' || gameState === 'LOSS' || gameState === 'KILL') return;

    if (mapType === 'RANDOM' && player.subClass !== 'MAPPER') {
        showNotification("警告：未知區域無法建立地圖數據！(需繪圖師副職業)");
        return;
    }
    
    isMapOpen = !isMapOpen;
    const mapModal = document.getElementById('map-modal');
    
    if (isMapOpen) {
        mapModal.classList.remove('hidden');
    } else {
        mapModal.classList.add('hidden');
    }
}

document.getElementById('retry-btn-loss').addEventListener('click', () => { document.getElementById('game-over-screen').classList.add('hidden'); startGame(); });
document.getElementById('retry-btn-win').addEventListener('click', () => { document.getElementById('victory-screen').classList.add('hidden'); startGame(); });
document.getElementById('retry-btn-kill').addEventListener('click', () => { document.getElementById('kill-screen').classList.add('hidden'); startGame(); });

const joyZone = document.getElementById('joystick-zone');
const actBtn = document.getElementById('action-btn');
const skillBtns = document.querySelectorAll('.game-btn');

joyZone.addEventListener('touchstart', e => { e.preventDefault(); const t = e.changedTouches[0]; joystick.active = true; joystick.tx = t.clientX; joystick.ty = t.clientY; }, {passive:false});
joyZone.addEventListener('touchmove', e => { e.preventDefault(); if(!joystick.active) return; const t = e.changedTouches[0]; joystick.dx = t.clientX - joystick.tx; joystick.dy = t.clientY - joystick.ty; }, {passive:false});
joyZone.addEventListener('touchend', e => { e.preventDefault(); joystick.active = false; joystick.dx = 0; joystick.dy = 0; }, {passive:false});

actBtn.addEventListener('touchstart', e => { e.preventDefault(); isActionPressed = true; actBtn.style.transform = 'scale(0.9)'; }, {passive:false});
actBtn.addEventListener('touchend', e => { e.preventDefault(); isActionPressed = false; actBtn.style.transform = 'scale(1.1)'; });
actBtn.addEventListener('mousedown', e => { isActionPressed = true; });
actBtn.addEventListener('mouseup', e => { isActionPressed = false; });

skillBtns.forEach(btn => {
    if(btn.id !== 'action-btn') {
        btn.addEventListener('touchstart', e => { 
            e.preventDefault(); 
            const skillName = btn.id.replace('-btn', '').toUpperCase();
            skillInput[skillName] = true;
            btn.style.transform = 'scale(0.9)'; 
        }, {passive:false});
        btn.addEventListener('touchend', e => { 
            e.preventDefault(); 
            const skillName = btn.id.replace('-btn', '').toUpperCase();
            skillInput[skillName] = false;
            btn.style.transform = 'scale(1.1)'; 
        });
        btn.addEventListener('mousedown', e => { 
            const skillName = btn.id.replace('-btn', '').toUpperCase();
            skillInput[skillName] = true;
        });
        btn.addEventListener('mouseup', e => { 
            const skillName = btn.id.replace('-btn', '').toUpperCase();
            skillInput[skillName] = false;
        });
    }
});

document.getElementById('pause-btn').addEventListener('click', function() {
    togglePause();
    this.blur(); 
});
document.getElementById('resume-btn').addEventListener('click', togglePause);
document.getElementById('menu-btn').addEventListener('click', () => {
    isPaused = false;
    document.getElementById('pause-screen').classList.add('hidden');
    document.getElementById('start-screen').classList.remove('hidden');
    document.getElementById('task-ui').classList.add('hidden');
    gameState = 'MENU';
});

document.getElementById('map-btn').addEventListener('click', function() {
    toggleMap();
    this.blur();
});
document.getElementById('map-modal').addEventListener('click', function(e) {
    if(e.target === this) toggleMap(); 
});

window.addEventListener('keydown', e => { 
    if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
        togglePause();
        e.preventDefault();
    }
    if (e.key === 'm' || e.key === 'M' || e.key === 'Tab') {
        toggleMap();
        e.preventDefault();
    }
    keys[e.key.toLowerCase()] = true; 
    if(e.code === 'Space') isActionPressed = true; 
});
window.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
    if(e.key === 'Shift') {
        keys['shift'] = false;
    }
    if(e.code === 'Space') {
        isActionPressed = false;
        keys.spaceLock = false;
    }
    const skillKeys = ['q', 'e', 'r', 'f', 'g', 't', 'h', 'v', 'c', 'b', 'j', 'k'];
    if (skillKeys.includes(e.key.toLowerCase())) {
        skillLocks[e.key.toUpperCase()] = false;
    }
});

window.addEventListener('resize', resize);
resize();
</script>
