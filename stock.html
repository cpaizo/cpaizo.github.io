<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選單</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fffaf0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 350px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px; /* 按鈕間距調整 */
        }

        .button {
            display: block;
            width: 100%;
            padding: 20px 0;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: all 0.2s ease;
        }

        .button:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* 粉蜜柑色 */
        .btn-view { background: linear-gradient(135deg, #ffd1a4 0%, #ffb366 100%); }
        /* 粉薄荷色 */
        .btn-history { background: linear-gradient(135deg, #a7e9e1 0%, #80ded3 100%); }
    </style>
</head>
<body>

    <div class="container">
        <div class="button-group">
            <a href="https://script.google.com/macros/s/AKfycbwLvrIazrGBW2IabsAQNHWlV5A8U9hPLlt_GvZLk9P86Ywgk2uBD7IwIE_wQ7MO93sH/exec?p=view" 
               target="_blank" class="button btn-view">資料查看</a>
               
            <a href="https://script.google.com/macros/s/AKfycbwLvrIazrGBW2IabsAQNHWlV5A8U9hPLlt_GvZLk9P86Ywgk2uBD7IwIE_wQ7MO93sH/exec?p=history" 
               target="_blank" class="button btn-history">歷史紀錄</a>
        </div>
    </div>

</body>
</html>
