<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Tzu Chi Scratch International Competition System</title>
    <style>
        :root {
            --primary-color: #005aad;
            --accent-color: #ffa64d;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .main-title {
            text-align: center;
            color: var(--primary-color);
            margin: 0;
            font-size: 2rem;
            font-weight: bold;
        }
        
        .sub-title {
            text-align: center;
            color: #666;
            margin: 5px 0 25px 0;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* 控制面板 */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 2px dashed #e0e0e0;
        }

        button {
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-align: center;
            line-height: 1.4;
            min-width: 180px;
        }

        button .en {
            display: block;
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        button .zh {
            display: block;
            font-size: 0.8rem;
            opacity: 0.85;
            font-weight: normal;
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: #004488; }
        
        .btn-accent { background-color: var(--accent-color); color: white; }
        .btn-accent:hover { background-color: #e68a2e; }

        .btn-print { background-color: #28a745; color: white; }
        .btn-print:hover { background-color: #218838; }

        button:active { transform: scale(0.98); }

        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 題目卡片 */
        .question-card {
            border-left: 5px solid var(--primary-color);
            background: #fafafa;
            padding: 20px;
            border-radius: 0 8px 8px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        /* 精簡版卡片 */
        .compact-card {
            border-left: 5px solid var(--accent-color);
            background: #fffdfa;
            padding: 15px 20px;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .question-num {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .compact-card .question-num {
            background-color: var(--accent-color);
            margin-bottom: 0;
            white-space: nowrap;
        }

        .lang-section { margin-bottom: 15px; }
        .lang-section:last-child { margin-bottom: 0; }
        .title { font-size: 1.25rem; font-weight: bold; color: #111; margin-bottom: 5px; }
        .type { font-size: 0.95rem; color: #666; font-style: italic; margin-bottom: 10px; }
        .details { font-size: 0.95rem; line-height: 1.5; margin-bottom: 10px; }
        .guide { background-color: #eef5fc; padding: 10px 15px; border-radius: 6px; font-size: 0.9rem; border-left: 3px solid #66a3ff; }

        /* 🖨️ 列印專用 CSS：直接列印目前顯示的內容 */
        @media print {
            body { background-color: #fff; padding: 0; }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            .control-panel { display: none !important; } /* 只隱藏控制按鈕 */
            .question-card { border: 1px solid #ddd; border-left: 5px solid #005aad; background: #fff; page-break-inside: avoid; }
            .compact-card { border: 1px solid #ddd; border-left: 5px solid #ffa64d; background: #fff; page-break-inside: avoid; }
            .guide { background-color: #fff; border: 1px solid #ccc; }
        }
    </style>
</head>

    <!-- 題目呈現區 -->

</div>

            en_guide: "<b>Sprite Rotation:</b> Use <code>when [right arrow] key pressed</code> → <code>turn right 15 degrees</code>.<br><b>Light Movement:</b> Use Pen blocks like <code>pen down</code>, <code>move 10 steps</code>, and <code>if &lt;touching [Love Mirror]?&gt; then</code> → <code>point in direction ()</code>."
        }
    ];

    window.onload = function() {
        showAllBoth();
    };

    // 1. 中英對照 (10題)
    function showAllBoth() {
        document.getElementById('pageStatus').innerText = "Bilingual Mode (10 Topics) / 中英對照畫面 (10題)";
        const container = document.getElementById('questionsContainer');
        container.innerHTML = ''; 

        pool.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div class="question-num">Topic #${item.id} / 大會題號 #${item.id}</div>
                <div class="lang-section">
                    <div class="title">【中文】${item.zh_title}</div>
                    <div class="type">專案類型：${item.zh_type}</div>
                    <div class="details"><b>建議玩法：</b>${item.zh_play}</div>
                    <div class="guide">🖥 程式設計引難：<br>${item.zh_guide}</div>
                </div>
                <div class="lang-section" style="margin-top:15px; border-top:1px dashed #ddd; padding-top:15px;">
                    <div class="title">【English】${item.en_title}</div>
                    <div class="type">Project Type: ${item.en_type}</div>
                    <div class="details"><b>Suggested Gameplay:</b>${item.en_play}</div>
                    <div class="guide">🖥 Programming Guidance:<br>${item.en_guide}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

                </div>

    // 3. 純英文畫面 (10題)
    function showAllEnglish() {
        document.getElementById('pageStatus').innerText = "English Only Mode (10 Topics) / 純英文畫面 (10題)";
        const container = document.getElementById('questionsContainer');
        container.innerHTML = ''; 

        pool.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.style.borderLeft = "5px solid #3385ff";
            card.innerHTML = `
                <div class="question-num" style="background-color: #3385ff;">Topic #${item.id}</div>
                <div class="lang-section">
                    <div class="title">${item.en_title}</div>
                    <div class="type">Project Type: ${item.en_type}</div>
                    <div class="details"><b>Suggested Gameplay:</b>${item.en_play}</div>
                    <div class="guide">🖥 Programming Guidance:<br>${item.en_guide}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 4. 隨機 5 題 (精簡且排序)
    function draw5CompactSorted() {
        document.getElementById('pageStatus').innerText = "Random 5 Topics (Sorted by ID) / 隨機 5 題 (按原題號順序排列)";
        const container = document.getElementById('questionsContainer');
        container.innerHTML = ''; 

        // 洗牌並隨機挑選 5 題
        let shuffled = [...pool].sort(() => 0.5 - Math.random());
        let selected = shuffled.slice(0, 5);
        
        // 🔥 精準升級：按照原本的 id 從小到大排序
        selected.sort((a, b) => a.id - b.id);

        selected.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'compact-card';
            card.innerHTML = `
                <div class="question-num">No. ${index + 1} (Q#${item.id})</div>
                <div>
                    <span style="color: #e68a2e; font-weight: bold;">【EN】${item.en_title}</span>
                    <span style="color: #ccc; margin: 0 10px;">|</span> 
                    <span style="color: #005aad;">【中】${item.zh_title}</span> 
                </div>
            `;
            container.appendChild(card);
        });
    }
</script>
